<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="足球闹钟Pro">
  <title>足球闹钟Pro - 闹钟权限测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1628;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      width: 100%;
      background: linear-gradient(135deg, #1a2744 0%, #0f3460 100%);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      border: 1px solid rgba(0,212,170,0.3);
    }
    .icon {
      font-size: 80px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }
    h1 span { color: #00d4aa; }
    .desc {
      color: #7f8c9a;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .status-box {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .status-label {
      font-size: 12px;
      color: #7f8c9a;
      margin-bottom: 8px;
    }
    .status-value {
      font-size: 18px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      display: inline-block;
    }
    .status-granted { background: #27ae60; color: white; }
    .status-denied { background: #e74c3c; color: white; }
    .status-default { background: #f39c12; color: white; }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00d4aa 0%, #00a080 100%);
      color: #0a1628;
    }
    .btn-primary:hover { transform: scale(1.02); }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-test {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: white;
    }
    .info {
      background: rgba(0,212,170,0.1);
      border: 1px solid #00d4aa;
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
      text-align: left;
    }
    .info h3 {
      font-size: 14px;
      color: #00d4aa;
      margin-bottom: 8px;
    }
    .info p {
      font-size: 12px;
      color: #7f8c9a;
      line-height: 1.6;
    }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #27ae60;
      color: white;
      padding: 16px 32px;
      border-radius: 12px;
      z-index: 1000;
      animation: fadeInOut 3s ease;
      font-size: 14px;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      20% { opacity: 1; transform: translateX(-50%) translateY(0); }
      80% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    }
    .alarm-demo {
      margin-top: 20px;
      padding: 20px;
      background: rgba(231,76,60,0.1);
      border-radius: 16px;
      border: 1px solid rgba(231,76,60,0.3);
    }
    .alarm-demo h3 {
      color: #e74c3c;
      margin-bottom: 12px;
    }
    .alarm-time {
      font-size: 48px;
      font-weight: bold;
      color: #e74c3c;
      margin: 16px 0;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    .feature {
      background: rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }
    .feature-icon { font-size: 24px; margin-bottom: 8px; }
    .feature-name { font-size: 12px; color: #7f8c9a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⏰</div>
    <h1>足球闹钟 <span>Pro</span></h1>
    <p class="desc">在比赛开始前收到手机通知提醒，不再错过任何精彩瞬间！</p>

    <div class="status-box">
      <div class="status-label">通知权限状态</div>
      <div class="status-value status-default" id="statusValue">正在检测...</div>
    </div>

    <button class="btn btn-primary" id="btnRequest" onclick="requestPermission()">
      🔔 请求通知权限
    </button>

    <button class="btn btn-test" id="btnTest" onclick="sendTestNotification()">
      🧪 测试通知
    </button>

    <div class="alarm-demo">
      <h3>🔴 闹钟演示</h3>
      <div class="alarm-time" id="currentTime">00:00:00</div>
      <p style="color:#7f8c9a;font-size:12px;">实时显示当前时间</p>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">📱</div>
        <div class="feature-name">手机通知</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔊</div>
        <div class="feature-name">声音提醒</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📳</div>
        <div class="feature-name">震动提示</div>
      </div>
      <div class="feature">
        <div class="feature-icon">⏱️</div>
        <div class="feature-name">提前提醒</div>
      </div>
    </div>

    <div class="info">
      <h3>📋 权限说明</h3>
      <p>
        1. 点击"请求通知权限"按钮<br>
        2. 在弹出的浏览器权限框中选择"允许"<br>
        3. 点击"测试通知"验证功能<br>
        4. 设置比赛提醒后，开赛前会收到通知
      </p>
    </div>
  </div>

  <script>
    // 更新状态显示
    function updateStatus() {
      const statusEl = document.getElementById('statusValue');
      const btnRequest = document.getElementById('btnRequest');

      if (!('Notification' in window)) {
        statusEl.textContent = '❌ 浏览器不支持';
        statusEl.className = 'status-value status-denied';
        btnRequest.style.display = 'none';
        return;
      }

      switch (Notification.permission) {
        case 'granted':
          statusEl.textContent = '✅ 已授权';
          statusEl.className = 'status-value status-granted';
          btnRequest.textContent = '✅ 权限已获取';
          btnRequest.disabled = true;
          btnRequest.style.opacity = '0.7';
          break;
        case 'denied':
          statusEl.textContent = '❌ 已拒绝';
          statusEl.className = 'status-value status-denied';
          btnRequest.textContent = '⚠️ 请在设置中开启';
          btnRequest.disabled = true;
          break;
        default:
          statusEl.textContent = '⏳ 需要授权';
          statusEl.className = 'status-value status-default';
          btnRequest.textContent = '🔔 请求通知权限';
      }
    }

    // 请求通知权限
    async function requestPermission() {
      try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          showToast('🎉 权限获取成功！');
        } else {
          showToast('⚠️ 权限被拒绝');
        }
        updateStatus();
      } catch (err) {
        console.error('Permission error:', err);
        showToast('❌ 请求失败，请重试');
      }
    }

    // 发送测试通知
    function sendTestNotification() {
      if (Notification.permission !== 'granted') {
        showToast('⚠️ 请先获取通知权限');
        return;
      }

      // 发送测试通知
      const notification = new Notification('⚽ 足球闹钟 - 测试通知', {
        body: '曼城 vs 利物浦 比赛将在 15:00 开始！',
        icon: '⚽',
        tag: 'test-alarm',
        requireInteraction: true, // 保持显示直到用户点击
        vibrate: [200, 100, 200, 100, 200], // 震动模式
        silent: false
      });

      notification.onclick = function() {
        window.focus();
        notification.close();
        showToast('👋 已点击通知');
      };

      // 5秒后自动关闭
      setTimeout(() => notification.close(), 10000);

      showToast('📱 通知已发送！请查看手机通知栏');
    }

    // Toast提示
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // 更新时钟
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
      document.getElementById('currentTime').textContent = timeStr;
    }

    // 每秒更新时钟
    setInterval(updateClock, 1000);
    updateClock();

    // 初始化
    updateStatus();

    // 尝试注册Service Worker（支持离线通知）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('Service Worker registered');
      }).catch(err => {
        console.log('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
