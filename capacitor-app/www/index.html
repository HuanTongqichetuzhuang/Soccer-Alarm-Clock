function renderMyMatches() {
  if (!favTeamNames.length) {
    document.getElementById('myMatchesContent').innerHTML =
      `<div class="fav-empty"><div class="icon">⭐</div>还没有收藏球队<br><small>在下方添加你的主队</small></div>`;
    document.getElementById('myMatchesCount').textContent = '0';
    return;
  }

  // 从所有联赛的缓存数据中查找主队比赛（用英文名匹配）
  let myMatches = [];
  const seenIds = new Set(); // 去重：同一场比赛可能出现在多个缓存key中
  const now = Date.now();
  for (const [key, val] of Object.entries(cachedData)) {
    if (!key.startsWith('league_')) continue;
    // 跳过联赛球队列表缓存（league_teams_）
    if (key.startsWith('league_teams_')) continue;
    const data = val.data;
    if (!data || !data.matches) continue;
    data.matches.forEach(m => {
      const isHomeFav = favTeamNames.includes(m.team1);
      const isAwayFav = favTeamNames.includes(m.team2);
      if (isHomeFav || isAwayFav) {
        // 用 date+team1+team2 生成去重key，防止同一场比赛重复显示
        const dedupKey = `${m.date}_${m.team1}_${m.team2}`;
        if (seenIds.has(dedupKey)) return;
        seenIds.add(dedupKey);

        // 从缓存key中提取真正的leagueId（格式：league_PL_2025-26 → PL）
        const keyParts = key.replace('league_', '').split('_');
        const leagueId = keyParts[0]; // 取第一段作为leagueId
        const lg = FOOTBALL_LEAGUES[leagueId];
        // 兼容两种数据格式：五大联赛用 score.ft，世界杯/欧冠/杯赛直接用 homeScore/awayScore
        const homeScore = m.score && m.score.ft ? m.score.ft[0] : (m.homeScore !== undefined ? m.homeScore : null);
        const awayScore = m.score && m.score.ft ? m.score.ft[1] : (m.awayScore !== undefined ? m.awayScore : null);

        // 时区处理：欧冠和杯赛数据已在数据源处完成北京时间转换，直接使用；
        // 五大联赛数据仍为欧洲当地时间，需要转换
        let bjDate, bjTime, bjTimestamp;
        if (m.timestamp && (leagueId === 'CL' || leagueId === 'WC' || lg.cupData)) {
          // 欧冠/世界杯/杯赛：数据已转为北京时间，直接用
          bjDate = m.date;
          bjTime = m.time;
          bjTimestamp = m.timestamp;
        } else {
          // 五大联赛：将欧洲当地时间转换为北京时间
          const bj = localToBJ(m.date, m.time || '15:00', leagueId);
          bjDate = bj.date;
          bjTime = bj.time;
          bjTimestamp = bj.timestamp;
        }

        // 判断该比赛属于哪个主队
        const favTeam = isHomeFav ? m.team1 : m.team2;

        myMatches.push({
          id: `${leagueId}_${m.date}_${m.team1}_${m.team2}`.replace(/\s/g, '_'),
          date: bjDate,
          time: bjTime,
          team1: m.team1,
          team2: m.team2,
          homeCn: getTeamCn(m.team1),
          awayCn: getTeamCn(m.team2),
          homeBadge: getTeamBadge(m.team1),
          awayBadge: getTeamBadge(m.team2),
          homeScore: homeScore,
          awayScore: awayScore,
          isLive: false,
          isFinished: homeScore !== null && awayScore !== null,
          round: m.round || '',
          timestamp: bjTimestamp,
          leagueName: lg ? lg.name : leagueId,
          leagueId: leagueId,
          favTeam: favTeam // 标记属于哪个主队
        });
      }
    });
  }

  // 杯赛数据（不走httpGet缓存，直接从CUP_MATCHES_2025_26获取）
  if (CUP_MATCHES_2025_26) {
    for (const [cupId, cupInfo] of Object.entries(CUP_MATCHES_2025_26)) {
      if (!cupInfo.matches) continue;
      const lg = FOOTBALL_LEAGUES[cupId];
      cupInfo.matches.forEach(m => {
        const isHomeFav = favTeamNames.includes(m.team1);
        const isAwayFav = favTeamNames.includes(m.team2);
        if (isHomeFav || isAwayFav) {
          const dedupKey = `${m.date}_${m.team1}_${m.team2}`;
          if (seenIds.has(dedupKey)) return;
          seenIds.add(dedupKey);
          const matchDate = new Date(m.date + 'T' + m.time + ':00+08:00');
          const hasScore = m.score && m.score.length === 2;
          const isFinished = hasScore && m.score[0] !== null;
          const favTeam = isHomeFav ? m.team1 : m.team2;
          myMatches.push({
            id: `${cupId}_${m.date}_${m.team1}_${m.team2}`.replace(/\s/g, '_'),
            date: m.date, time: m.time,
            team1: m.team1, team2: m.team2,
            homeCn: getTeamCn(m.team1), awayCn: getTeamCn(m.team2),
            homeBadge: getTeamBadge(m.team1), awayBadge: getTeamBadge(m.team2),
            homeScore: hasScore ? m.score[0] : null, awayScore: hasScore ? m.score[1] : null,
            isLive: false, isFinished: isFinished,
            round: m.round || '',
            timestamp: matchDate.getTime(),
            leagueName: lg ? lg.name : cupId,
            leagueId: cupId,
            favTeam: favTeam
          });
        }
      });
    }
  }

  // 按时间排序，过滤已结束的比赛
  myMatches.sort((a, b) => a.timestamp - b.timestamp);
  myMatches = myMatches.filter(m => !m.isFinished && m.timestamp >= now - 3*60*60*1000);

  const totalMatches = myMatches.length;
  document.getElementById('myMatchesCount').textContent = totalMatches;

  if (!totalMatches) {
    document.getElementById('myMatchesContent').innerHTML =
      `<div class="fav-empty"><div class="icon">📅</div>暂无主队赛程数据<br><small>浏览赛程页后数据将自动缓存</small></div>`;
    return;
  }

  // 按主队分组
  const grouped = {};
  myMatches.forEach(m => {
    const teamKey = m.favTeam;
    if (!grouped[teamKey]) {
      grouped[teamKey] = {
        nameEn: teamKey,
        nameCn: getTeamCn(teamKey),
        badge: getTeamBadge(teamKey),
        matches: []
      };
    }
    grouped[teamKey].matches.push(m);
  });

  // 每个主队最多显示5场
  Object.values(grouped).forEach(g => {
    g.matches = g.matches.slice(0, 5);
  });

  const teamKeys = Object.keys(grouped);

  // 单主队：直接展示比赛列表（不折叠）
  if (teamKeys.length === 1) {
    const g = grouped[teamKeys[0]];
    const html = g.matches.map(ev => renderMatchCard(ev, ev.leagueName, ev.leagueId, true)).join('');
    document.getElementById('myMatchesContent').innerHTML = html;
    return;
  }

  // 多主队：按球队折叠展示
  let html = '';
  teamKeys.forEach(teamKey => {
    const g = grouped[teamKey];
    const matchCount = g.matches.length;
    const badgeHtml = g.badge
      ? `<img src="${ha(g.badge)}" alt="${ha(g.nameCn)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" style="width:24px;height:24px;object-fit:contain;border-radius:4px"><div style="display:none;width:24px;height:24px;background:var(--accent,#1a73e8);border-radius:50%;color:var(--txt);font-size:12px;font-weight:700;line-height:24px;text-align:center">${ha(g.nameCn.charAt(0))}</div>`
      : `<div style="width:24px;height:24px;background:var(--accent,#1a73e8);border-radius:50%;color:var(--txt);font-size:12px;font-weight:700;line-height:24px;text-align:center">${ha(g.nameCn.charAt(0))}</div>`;
    html += `
      <div class="fav-team-group">
        <div class="fav-team-header" onclick="toggleFavTeamGroup(this)">
          <div class="fav-team-header-left">
            ${badgeHtml}
            <span class="fav-team-name">${ha(g.nameCn)}</span>
            <span class="fav-team-count">${matchCount}场</span>
          </div>
          <div class="fav-team-arrow">▶</div>
        </div>
        <div class="fav-team-body" style="display:none">

// ==================== TODAY FAV MATCHES ====================
// 主队今日赛事：今天 00:00 到 明天 06:00 之间的主队比赛
function renderTodayMatches() {
  if (!favTeamNames.length) {
    document.getElementById('todayMatchesContent').innerHTML =
      `<div class="fav-empty"><div class="icon">📅</div>先选择你的主队</div>`;
    document.getElementById('todayMatchesCount').textContent = '0';
    return;
  }

  // 计算时间范围：今天 00:00 ~ 明天 06:00（北京时间）
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0).getTime();
  const tomorrowEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 6, 0, 0).getTime();

  // 从 cachedData 中搜索今日主队比赛
  let todayMatches = [];
  const seenIds = new Set();

  for (const [key, val] of Object.entries(cachedData)) {
    if (!key.startsWith('league_')) continue;
    if (key.startsWith('league_teams_')) continue;
    const data = val.data;
    if (!data || !data.matches) continue;

    data.matches.forEach(m => {
      const isHomeFav = favTeamNames.includes(m.team1);
      const isAwayFav = favTeamNames.includes(m.team2);
      if (!isHomeFav && !isAwayFav) return;

      // 兼容两种比分格式
      const homeScore = m.score && m.score.ft ? m.score.ft[0] : (m.homeScore !== undefined ? m.homeScore : null);
      const awayScore = m.score && m.score.ft ? m.score.ft[1] : (m.awayScore !== undefined ? m.awayScore : null);

      const keyParts = key.replace('league_', '').split('_');
      const leagueId = keyParts[0];
      const lg = FOOTBALL_LEAGUES[leagueId];

      // 时区处理：欧冠和杯赛数据已在数据源处完成北京时间转换，直接使用；
      // 五大联赛数据仍为欧洲当地时间，需要转换
      let bjDate, bjTime, bjTimestamp;
      if (m.timestamp && (leagueId === 'CL' || leagueId === 'WC' || lg.cupData)) {
        // 欧冠/世界杯/杯赛：数据已转为北京时间，直接用
        bjDate = m.date;
        bjTime = m.time;
        bjTimestamp = m.timestamp;
      } else {
        // 五大联赛：将欧洲当地时间转换为北京时间
        const bj = localToBJ(m.date, m.time || '15:00', leagueId);
        bjDate = bj.date;
        bjTime = bj.time;
        bjTimestamp = bj.timestamp;
      }

      // 筛选今天到明天06:00的比赛
      if (bjTimestamp < todayStart || bjTimestamp >= tomorrowEnd) return;

      // 已结束的比赛也显示（用户可能想看比分）
      const dedupKey = `${m.date}_${m.team1}_${m.team2}`;
      if (seenIds.has(dedupKey)) return;
      seenIds.add(dedupKey);

      const favTeam = isHomeFav ? m.team1 : m.team2;

      todayMatches.push({
        id: `${leagueId}_${m.date}_${m.team1}_${m.team2}`.replace(/\s/g, '_'),
        date: bjDate,
        time: bjTime,
        team1: m.team1,
        team2: m.team2,
        homeCn: getTeamCn(m.team1),
        awayCn: getTeamCn(m.team2),
        homeBadge: getTeamBadge(m.team1),
        awayBadge: getTeamBadge(m.team2),
        homeScore: homeScore,
        awayScore: awayScore,
        isLive: false,
        isFinished: homeScore !== null && awayScore !== null,
        round: m.round || '',
        timestamp: bjTimestamp,
        leagueName: lg ? lg.name : leagueId,
        leagueId: leagueId,
        favTeam: favTeam
      });
    });
  }

  // 杯赛数据
  if (CUP_MATCHES_2025_26) {
    for (const [cupId, cupInfo] of Object.entries(CUP_MATCHES_2025_26)) {
      if (!cupInfo.matches) continue;
      const lg = FOOTBALL_LEAGUES[cupId];
      cupInfo.matches.forEach(m => {
        const isHomeFav = favTeamNames.includes(m.team1);
        const isAwayFav = favTeamNames.includes(m.team2);
        if (!isHomeFav && !isAwayFav) return;

        const matchDate = new Date(m.date + 'T' + m.time + ':00+08:00');
        const timestamp = matchDate.getTime();
        if (timestamp < todayStart || timestamp >= tomorrowEnd) return;

        const dedupKey = `${m.date}_${m.team1}_${m.team2}`;
        if (seenIds.has(dedupKey)) return;
        seenIds.add(dedupKey);

        const hasScore = m.score && m.score.length === 2;
        const favTeam = isHomeFav ? m.team1 : m.team2;

        todayMatches.push({
          id: `${cupId}_${m.date}_${m.team1}_${m.team2}`.replace(/\s/g, '_'),
          date: m.date, time: m.time,
          team1: m.team1, team2: m.team2,
          homeCn: getTeamCn(m.team1), awayCn: getTeamCn(m.team2),
          homeBadge: getTeamBadge(m.team1), awayBadge: getTeamBadge(m.team2),
          homeScore: hasScore ? m.score[0] : null, awayScore: hasScore ? m.score[1] : null,
          isLive: false, isFinished: hasScore && m.score[0] !== null,
          round: m.round || '',
          timestamp: timestamp,
          leagueName: lg ? lg.name : cupId,
          leagueId: cupId,
          favTeam: favTeam
        });
      });
    }
  }

  // 实时判断进行中状态
  todayMatches.forEach(m => {
    if (m.isFinished) return;
    const diffMin = (now - m.timestamp) / 60000;
    if (diffMin >= 0 && diffMin < 105) {
      m.isLive = true;
      m.statusText = `⚽ 进行中 约${Math.floor(diffMin)}'`;
    }
  });

  // 按时间排序
  todayMatches.sort((a, b) => a.timestamp - b.timestamp);

  document.getElementById('todayMatchesCount').textContent = todayMatches.length;

  if (!todayMatches.length) {
    document.getElementById('todayMatchesContent').innerHTML =
      `<div class="fav-empty" style="padding:20px"><div class="icon">😴</div>今日主队没有比赛</div>`;
    return;
  }

  // 渲染今日比赛卡片（复用 renderMatchCard，自动支持闹钟按钮+日期显示）
  const html = todayMatches.map(ev => renderMatchCard(ev, ev.leagueName, ev.leagueId, true)).join('');

  document.getElementById('todayMatchesContent').innerHTML = html;
}

async function loadTeamMatches(teamId, teamName, leagueId) {
  const contentEl = document.getElementById('teamDetailContent');
  contentEl.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">加载比赛数据...</div></div>`;
  
  // 收集所有联赛中该球队的比赛
  let allMatches = [];
  
  // 从缓存中获取所有联赛数据
  const loadPromises = Object.keys(FOOTBALL_LEAGUES).map(async lid => {
    try {
      const matches = await fetchNextMatches(lid);
      return matches;
    } catch(e) {
      return [];
    }
  });
  
  const allLeagueMatches = await Promise.all(loadPromises);
  allLeagueMatches.forEach(matches => {
    allMatches = allMatches.concat(matches);
  });
  
  // 筛选该球队的比赛（多种匹配方式确保跨联赛匹配）
  const teamMatches = allMatches.filter(m => {
    return isTeamMatch(m.team1, teamName, teamId) || isTeamMatch(m.team2, teamName, teamId);
  });
  
  // 按时间排序（升序，最早在前）
  teamMatches.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
  
  const now = Date.now();
  // 最近5场已结束比赛，按时间从远到近排列（最早在前，最新在后）
  const allPast = teamMatches.filter(m => m.isFinished || m.timestamp < now);
  const pastMatches = allPast.slice(-5);  // 取最近5场，保持时间升序
  const futureMatches = teamMatches.filter(m => !m.isFinished && m.timestamp >= now).slice(0, 10);
  
  if (!pastMatches.length && !futureMatches.length) {
    contentEl.innerHTML = `<div class="fav-empty"><div class="icon">⚽</div>暂无比赛数据<br><small>请先浏览赛程页加载数据</small></div>`;
    return;
  }
  
  let html = '';
  
  // 过去5场（近期战绩）
  if (pastMatches.length) {
    html += `<div class="team-detail-section">
      <div class="team-detail-section-title">📋 近期战绩 <span class="count">${pastMatches.length}场</span></div>`;
    pastMatches.forEach(m => {
      html += renderTeamMatchItem(m, teamName, true);
    });
    html += `</div>`;
  }
  
  // 未来10场（即将开赛）
  if (futureMatches.length) {
    html += `<div class="team-detail-section">
      <div class="team-detail-section-title">📅 即将开赛 <span class="count">${futureMatches.length}场</span></div>`;
    futureMatches.forEach(m => {
      html += renderTeamMatchItem(m, teamName, false);
    });
    html += `</div>`;
  }
  
  contentEl.innerHTML = html;
}

function isTeamMatch(matchTeamName, searchName, searchId) {
  if (!matchTeamName) return false;
  // 精确匹配
  if (matchTeamName === searchName || matchTeamName === searchId) return true;
  // 去括号匹配
  const stripped = matchTeamName.replace(/\s*\([A-Z]{3}\)\s*$/, '').trim();
  if (stripped === searchName || stripped === searchId) return true;
  // 中文匹配
  const cn = getTeamCn(matchTeamName);
  if (cn === searchName) return true;
  // 模糊匹配
  if (matchTeamName.includes(searchName) || searchName.includes(matchTeamName)) return true;
  if (stripped.includes(searchName) || searchName.includes(stripped)) return true;
  return false;
}

    const checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M9 12l2 2 4-4" stroke-width="2.8"/></svg>';

    : awayTeamCn.charAt(0);

  return `<div class="team-match-item-v2">

// ==================== MATCH ALARMS ====================
function toggleAlarm(alarmId, home, away, timeStr, leagueName, ts) {
  const idx = notifications.findIndex(n => n.id === alarmId);
  if (idx >= 0) {
    notifications.splice(idx, 1);
    showToast('已取消闹钟提醒');
    if (window.AndroidAlarm && window.AndroidAlarm.cancelAlarm) {
      try { window.AndroidAlarm.cancelAlarm(alarmId); } catch(e) { showToast('取消失败：' + e.message); }
    }
  } else {
    notifications.push({id:alarmId, home, away, timeStr, leagueName, ts});
    showToast(`✅ 已设置闹钟：${home} vs ${away}`);

    // 优先使用增强版闹钟（自动适配 ColorOS）
    const reminderTs = ts - 15*60*1000; // 提前15分钟提醒
    if (window.AndroidAlarm && window.AndroidAlarm.createEnhancedAlarm) {
      try {
        const result = window.AndroidAlarm.createEnhancedAlarm(alarmId, home, away, reminderTs, false);
        try {
          const resultObj = JSON.parse(result);
          showToast(resultObj.success ? '✅ 系统闹钟已设置（提前15分钟）' : '⚠️ ' + resultObj.message);
        } catch(e) {
          showToast('✅ 系统闹钟已设置（提前15分钟）');
        }
      } catch(e) {
        showToast('⚠️ 闹钟设置失败：' + e.message);
      }
    } else if (window.AndroidAlarm && window.AndroidAlarm.createSystemAlarm) {
      // 回退方案
      try {
        window.AndroidAlarm.createSystemAlarm(alarmId, home, away, reminderTs, false);
        showToast('✅ 系统闹钟已设置（提前15分钟）');
      } catch(e) {
        showToast('⚠️ 闹钟设置失败：' + e.message);
      }
    }

    // 同步添加日历事件（双重保险）
    addToCalendar(
      '⚽ ' + home + ' vs ' + away,
      ts,                     // 日历开始时间=比赛开始时间
      ts + 105*60*1000,       // 日历结束时间=比赛开始+105分钟(90分钟比赛+15分钟中场)
      leagueName + ' 比赛提醒\n' + home + ' vs ' + away
    );
  }
  saveState();
  if (currentPage === 'alarm') renderMatchAlarmList();
  refreshCurrentPage();
  // 刷新球队详情页闹钟按钮状态
  if (currentDetailTeam && document.getElementById('teamDetail').classList.contains('active')) {
    // 仅更新闹钟按钮的DOM状态，不重新加载网络数据
    document.querySelectorAll('#teamDetailContent .td-alarm-btn').forEach(btn => {
      const alarmId = btn.getAttribute('data-alarm-id');
      if (!alarmId) return;
      const hasAlarm = notifications.some(n => n.id === alarmId);
      const bellSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>';
      const checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M9 12l2 2 4-4" stroke-width="2.8"/></svg>';
      btn.classList.toggle('set', hasAlarm);
      btn.innerHTML = `${hasAlarm?checkSvg:bellSvg}<span>${hasAlarm?'已设':'提醒'}</span>`;
    });
  }
}

function scheduleWebNotification(home, away, league, matchTs) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') doScheduleWeb(home, away, league, matchTs);
    });
    return;
  }
  doScheduleWeb(home, away, league, matchTs);
}

function doScheduleWeb(home, away, league, matchTs) {
  const delay = matchTs - Date.now() - 15*60*1000;
  if (delay > 0 && delay < 7*24*60*60*1000) {
    setTimeout(() => {
      try {
        new Notification('⚽ 足球提醒', {
          body: `${home} vs ${away} 还有15分钟开始！（${league}）`,
          icon: '/favicon.ico'
        });
      } catch(e) {}
    }, delay);
  }
}

// ==================== NAVIGATION ====================
function switchPage(name, idx) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav' + idx).classList.add('active');
  currentPage = name;

  switch(name) {
    case 'schedule':  loadSchedule(); break;
    case 'live':      loadLive();     break;
    case 'results':   loadResults();  break;
    case 'standings': loadStandings(); break;
    case 'alarm':     loadAlarmPage(); break;
    case 'my':        loadMyPage();   break;
  }
}

function refreshCurrentPage() {
  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.classList.add('loading');
  refreshBtn.textContent = '⏳ 刷新中';

  switch(currentPage) {
    case 'schedule': {
      const lg = FOOTBALL_LEAGUES[currentLeagues.schedule];
      if (lg) delete cachedData['league_' + currentLeagues.schedule];
      saveState(); loadSchedule(); break;
    }
    case 'live':
      // 清除实时比分缓存
      Object.keys(cachedData).forEach(k => { if (k.startsWith('league_')) delete cachedData[k]; });
      saveState(); loadLive(); break;
    case 'results': {
      const lg = FOOTBALL_LEAGUES[currentLeagues.results];
      if (lg) delete cachedData['league_' + currentLeagues.results];
      saveState(); loadResults(); break;
    }
    case 'standings': {
      const lg = FOOTBALL_LEAGUES[currentLeagues.standings];
      if (lg) delete cachedData['league_' + currentLeagues.standings];
      saveState(); loadStandings(); break;
    }
    case 'alarm': loadAlarmPage(); break;
    case 'my': loadMyPage(); break;
  }

  setTimeout(() => {
    refreshBtn.classList.remove('loading');
    refreshBtn.textContent = '🔄 刷新';
  }, 2000);
}

// ==================== TOAST ====================
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== 日期选择功能 ====================
function initDatePicker() {
  const dateInput = document.getElementById('scheduleDate');
  if (!dateInput) return;

  // 设置默认值为今天
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  dateInput.value = todayStr;
  dateInput.min = '2025-08-01'; // 赛季开始
  dateInput.max = '2026-07-31'; // 赛季结束
}

function onDateChange() {
  const dateInput = document.getElementById('scheduleDate');
  if (!dateInput || !dateInput.value) return;

  const selectedDate = dateInput.value; // 格式：YYYY-MM-DD
  currentScheduleDate = selectedDate;

  // 清除缓存以强制刷新
  delete cachedData['league_' + currentLeagues.schedule];

  loadSchedule(currentLeagues.schedule, selectedDate);
}

function goToToday() {
  const dateInput = document.getElementById('scheduleDate');
  if (!dateInput) return;

  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  dateInput.value = todayStr;
  currentScheduleDate = todayStr;

  // 重新加载赛程
  loadSchedule(currentLeagues.schedule, todayStr);
}

// 当前选中的日期
let currentScheduleDate = null;

// ==================== INIT ====================
function init() {
  try {
    loadState();
    if ('Notification' in window && Notification.permission === 'default') {
      try { Notification.requestPermission(); } catch(e) {}
    }
    initDatePicker();
    loadSchedule('PL');
    // 首次启动3秒后检查权限
    setTimeout(checkAndAutoGuidePermissions, 3000);
    // 监听页面可见性变化（用户从设置返回时刷新权限状态）
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') {
        // 延迟刷新等待系统状态更新
        setTimeout(checkAndRenderPermissions, 500);
      }
    });
    // 监听窗口focus（某些Android设备不支持visibilitychange）
    window.addEventListener('focus', function() {
      setTimeout(checkAndRenderPermissions, 500);
    });
  } catch(e) {
    // 如果init崩溃，把错误显示在页面上
    const errDiv = document.getElementById('initError');
    if (errDiv) {
      errDiv.style.display = 'block';
      errDiv.textContent = '初始化错误: ' + e.message + '\n' + e.stack;
    }
    console.error('init() error:', e);
  }
}

// 全局错误捕获
window.onerror = function(msg, url, line, col, error) {
  const errDiv = document.getElementById('initError');
  if (errDiv) {
    errDiv.style.display = 'block';
    errDiv.textContent += '\nJS错误 L' + line + ': ' + msg;
  }
  console.error('Global error:', msg, url, line, col, error);
};

window.addEventListener('unhandledrejection', function(e) {
  const errDiv = document.getElementById('initError');
  if (errDiv) {
    errDiv.style.display = 'block';
    errDiv.textContent += '\nPromise错误: ' + (e.reason ? e.reason.message || e.reason : e);
  }
  console.error('Unhandled rejection:', e.reason);
});

// 首次启动自动检查并引导权限
function checkAndAutoGuidePermissions() {
  if (!window.AndroidAlarm) return;
  try {
    const missing = window.AndroidAlarm.getMissingPermissions();
    const list = JSON.parse(missing);
    if (list.length > 0) {
      // 自动跳转到"我的"页面显示权限引导
      const permNames = {
        'exactAlarm': '精确闹钟',
        'notification': '通知权限',
        'batteryWhitelist': '电池优化',
        'overlay': '悬浮窗'
      };
      const names = list.map(k => permNames[k] || k).join('、');
      showToast(`⚠️ 缺少${names}，请前往「我的」页面开启`);
    }
  } catch(e) {}
}

// 兼容性启动：确保 DOM 完全就绪后再初始化
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

<script>
// ==================== 数据服务集成 ====================
const DATA_SERVER = {
  url: localStorage.getItem('dataServerUrl') || '',
  get enabled() { return !!this.url; },
  
  async fetch(endpoint) {
    if (!this.url) throw new Error('未配置服务器');
    const res = await fetchWithTimeout(this.url + endpoint, 8000);
    if (typeof res === 'string') return JSON.parse(res);
    return res;
  },

  // 获取实时比分
  async getLive() {
    const cached = sessionStorage.getItem('live_cache');
    if (cached) {
      const parsed = JSON.parse(cached);
      if (Date.now() - parsed.ts < 15000) return parsed.data;
    }
    const result = await this.fetch('/api/live');
    sessionStorage.setItem('live_cache', JSON.stringify({ data: result, ts: Date.now() }));
    return result;
  },

  // 获取赛程
  async getFixtures(leagueId, season) {
    return this.fetch('/api/fixtures/' + leagueId + '?season=' + (season || '2025'));
  },

  // 获取积分榜
  async getStandings(leagueId) {
    return this.fetch('/api/standings/' + leagueId);
  },

  // 健康检查
  async health() {
    return this.fetch('/api/health');
  },

  // 切换数据源
  async setSource(mode) {
    return this.fetch('/api/source?mode=' + mode);
  }
};

// ==================== 自动刷新管理器 ====================
let autoRefreshTimer = null;
let lastRefreshTime = 0;

function startAutoRefresh(intervalMs) {
  stopAutoRefresh();
  intervalMs = intervalMs || 60000; // 默认 60 秒
  autoRefreshTimer = setInterval(() => {
    if (currentPage === 'live') {
      loadLive();
      lastRefreshTime = Date.now();
      updateRefreshIndicator();
    }
  }, intervalMs);
}

function stopAutoRefresh() {
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
}

function updateRefreshIndicator() {
  const el = document.getElementById('refreshIndicator');
  if (!el) return;
  const seconds = Math.floor((Date.now() - lastRefreshTime) / 1000);
  if (seconds < 5) {
    el.textContent = '刚刚更新';
    el.style.color = 'var(--success)';
  } else if (seconds < 60) {
    el.textContent = seconds + '秒前更新';
    el.style.color = 'var(--txt-muted)';
  } else {
    el.textContent = Math.floor(seconds / 60) + '分钟前更新';
    el.style.color = 'var(--warn)';
  }
}

// ==================== 数据源状态指示 ====================
function showSourceStatus(source) {
  const el = document.getElementById('sourceStatus');
  if (!el) return;
  const labels = {
    'api-football': 'API',
    'scrape': '抓取',
    'cache': '缓存',
    'error': '离线'
  };
  const colors = {
    'api-football': 'var(--success)',
    'scrape': 'var(--warn)',
    'cache': 'var(--txt-muted)',
    'error': 'var(--danger)'
  };
  el.textContent = '数据源: ' + (labels[source] || source);
  el.style.color = colors[source] || 'var(--txt-muted)';
}

// ==================== 服务器配置面板 ====================
function showServerSettings() {
  const url = DATA_SERVER.url || '';
  const html = `
    <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:center;justify-content:center" onclick="if(event.target===this)this.remove()">
      <div style="background:var(--bg2);border-radius:16px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto" onclick="event.stopPropagation()">
        <h3 style="color:var(--txt);margin-bottom:16px">数据服务配置</h3>

        <label style="color:var(--txt-muted);font-size:12px;display:block;margin-bottom:6px">服务器地址</label>
        <input id="serverUrlInput" value="${url}" placeholder="https://your-server.com" style="width:100%;padding:10px;background:var(--s08);border:1px solid var(--s12);border-radius:8px;color:var(--txt);margin-bottom:12px;font-size:14px">

        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button onclick="testServerConnection()" style="flex:1;padding:10px;background:var(--abg2);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-size:13px;cursor:pointer">测试连接</button>
          <button onclick="saveServerSettings()" style="flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;cursor:pointer;font-weight:600">保存</button>
        </div>

        <div id="serverTestResult" style="font-size:12px;margin-bottom:12px"></div>

        <div style="margin-bottom:12px">
          <label style="color:var(--txt-muted);font-size:12px;display:block;margin-bottom:6px">数据源模式</label>
          <select id="sourceModeSelect" onchange="changeSourceMode(this.value)" style="width:100%;padding:10px;background:var(--s08);border:1px solid var(--s12);border-radius:8px;color:var(--txt);font-size:14px">
            <option value="auto">自动（API优先）</option>
            <option value="api">仅 API</option>
            <option value="scrape">仅抓取</option>
          </select>
        </div>

        <div style="margin-bottom:12px">
          <label style="color:var(--txt-muted);font-size:12px;display:block;margin-bottom:6px">自动刷新间隔</label>
          <select id="refreshIntervalSelect" onchange="changeRefreshInterval(this.value)" style="width:100%;padding:10px;background:var(--s08);border:1px solid var(--s12);border-radius:8px;color:var(--txt);font-size:14px">
            <option value="30">30 秒</option>
            <option value="60" selected>60 秒</option>
            <option value="120">2 分钟</option>
            <option value="300">5 分钟</option>
            <option value="0">关闭</option>
          </select>
        </div>

        
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--s12)">
          <label style="color:var(--txt);font-size:14px;font-weight:600;margin-bottom:8px;display:block">版本更新</label>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <button onclick="checkAppVersion()" style="flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer;font-weight:600">检查更新</button>
          </div>
          <div id="updateResult" style="font-size:12px"></div>
        </div>
        <button onclick="document.querySelector('[style*=z-index:9999]').remove()" style="width:100%;padding:12px;background:var(--s08);border:1px solid var(--s12);border-radius:8px;color:var(--txt);font-size:14px;cursor:pointer">关闭</button>
      </div>
    </div>
  `;
  const div = document.createElement('div');
  div.innerHTML = html;
  document.body.appendChild(div.firstElementChild);
}

async function testServerConnection() {
  const url = document.getElementById('serverUrlInput').value.trim();
  const result = document.getElementById('serverTestResult');
  result.textContent = '测试中...';
  result.style.color = 'var(--txt-muted)';
  
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);
    const res = await fetch(url + '/api/health', { signal: controller.signal });
    clearTimeout(timeout);
    const data = await res.json();
    result.textContent = '✓ 连接成功 | 数据源: ' + (data.sources.api ? 'API可用' : '抓取模式');
    result.style.color = 'var(--success)';
  } catch(e) {
    result.textContent = '✗ 连接失败: ' + e.message;
    result.style.color = 'var(--danger)';
  }
}

function saveServerSettings() {
  const url = document.getElementById('serverUrlInput').value.trim().replace(/\/$/, '');
  DATA_SERVER.url = url;
  localStorage.setItem('dataServerUrl', url);
  document.getElementById('serverTestResult').textContent = '已保存';
  document.getElementById('serverTestResult').style.color = 'var(--success)';
  updateServerIndicator();
  setTimeout(() => document.querySelector('[style*=z-index:9999]').remove(), 500);
}

async function changeSourceMode(mode) {
  if (DATA_SERVER.url) {
    try { await DATA_SERVER.setSource(mode); } catch(e) {}
  }
  localStorage.setItem('dataSourceMode', mode);
}

function changeRefreshInterval(sec) {
  localStorage.setItem('refreshInterval', sec);
  if (parseInt(sec) > 0) {
    startAutoRefresh(parseInt(sec) * 1000);
  } else {
    stopAutoRefresh();
  }
}

// ==================== 服务器状态指示器 ====================
function updateServerIndicator() {
  const el = document.getElementById('serverIndicator');
  if (!el) return;
  if (DATA_SERVER.enabled) {
    el.textContent = '●';
    el.style.color = 'var(--success)';
    el.title = '数据服务已连接';
  } else {
    el.textContent = '○';
    el.style.color = 'var(--txt-muted)';
    el.title = '数据服务未配置（点击配置）';
  }
}

// ==================== 覆盖: Live 页使用服务器数据 ====================
const _originalLoadLive = loadLive;
loadLive = async function() {
  if (DATA_SERVER.enabled) {
    showLoading('liveContent', '获取实时比分...');
    try {
      const result = await DATA_SERVER.getLive();
      showSourceStatus(result.source);
      
      if (result.source === 'api-football' && result.data && result.data.response) {
        renderApiLiveMatches(result.data.response);
        document.getElementById('liveCount').textContent = result.data.response.length;
        updateRefreshIndicator();
        return;
      }
      if (result.source === 'scrape') {
        showToast('API 不可用，已切换到抓取模式');
      }
      if (result.source === 'cache') {
        showToast('数据源离线，显示缓存数据');
      }
    } catch(e) {
      showToast('服务器连接失败: ' + e.message);
    }
  }
  // 回退到原有逻辑
  return _originalLoadLive();
};

// 渲染 API 返回的比赛数据
function renderApiLiveMatches(fixtures) {
  const content = document.getElementById('liveContent');
  if (!fixtures.length) {
    content.innerHTML = `<div class="info-banner" style="text-align:center;padding:30px 14px">
      <div style="font-size:40px;margin-bottom:10px">⚽</div>
      <b>暂无正在进行的比赛</b><br>
      <span style="color:var(--txt-muted);font-size:12px">` + new Date().toLocaleTimeString('zh-CN') + `</span>
    </div>`;
    return;
  }

  let html = '';
  fixtures.forEach(f => {
    const home = f.teams.home.name;
    const away = f.teams.away.name;
    const score = f.goals.home + ' - ' + f.goals.away;
    const minute = f.status.elapsed || 0;
    const isLive = f.status.short === '1H' || f.status.short === '2H' || f.status.short === 'HT' || f.status.short === 'ET';
    const leagueName = f.league.name;
    const homeLogo = f.teams.home.logo || '';
    const awayLogo = f.teams.away.logo || '';

    html += `<div class="match-card${isLive ? ' live' : ''}">
      <div class="match-side">
        ${homeLogo ? `<img src="${homeLogo}" alt="${home}">` : `<div class="match-side-icon">${home[0]}</div>`}
        <div class="match-side-name">${home}</div>
      </div>
      <div class="match-center">
        <div class="match-center-league">${leagueName}</div>
        <div class="match-center-score${isLive ? ' live' : ''}">${score}</div>
        <div class="match-center-sub${isLive ? ' live-text' : ''}">${isLive ? minute + "'" : f.status.long}</div>
      </div>
      <div class="match-side">
        ${awayLogo ? `<img src="${awayLogo}" alt="${away}">` : `<div class="match-side-icon">${away[0]}</div>`}
        <div class="match-side-name">${away}</div>
      </div>
    </div>`;
  });

  content.innerHTML = html;
}

// ==================== 页面导航拦截（刷新控制） ====================
const _originalNavigateTo = navigateTo;
navigateTo = function(page, ...args) {
  _originalNavigateTo(page, ...args);
  stopAutoRefresh();
  if (page === 'live') {
    const interval = parseInt(localStorage.getItem('refreshInterval') || '60') * 1000;
    if (interval > 0) startAutoRefresh(interval);
    lastRefreshTime = Date.now();
    updateRefreshIndicator();
  }
};

// ==================== 初始化 ====================
(function initDataServer() {
  // 恢复服务器配置
  const savedUrl = localStorage.getItem('dataServerUrl');
  if (savedUrl) DATA_SERVER.url = savedUrl;
  
  // 添加服务器指示器到 Header
  const headerP = document.querySelector('.header-left p');
  if (headerP) {
    const indicator = document.createElement('span');
    indicator.id = 'serverIndicator';
    indicator.style.cssText = 'cursor:pointer;margin-left:6px;font-size:12px';
    indicator.onclick = showServerSettings;
    headerP.appendChild(indicator);
    updateServerIndicator();
  }
  
  // 添加刷新时间指示器到 live 页面
  const liveContent = document.getElementById('liveContent');
  if (liveContent) {
    const refreshEl = document.createElement('div');
    refreshEl.id = 'refreshIndicator';
    refreshEl.style.cssText = 'text-align:center;font-size:11px;padding:6px 0;color:var(--txt-muted)';
    liveContent.parentNode.insertBefore(refreshEl, liveContent);
  }

  // 添加数据源状态条
  const mainContent = document.querySelector('.page.active') || document.querySelector('.page');
  if (mainContent) {
    const sourceEl = document.createElement('div');
    sourceEl.id = 'sourceStatus';
    sourceEl.style.cssText = 'text-align:center;font-size:10px;padding:4px 0;display:none';
    mainContent.insertBefore(sourceEl, mainContent.firstChild);
  }
  
  // 自动启动刷新（如果在 live 页）
  if (currentPage === 'live') {
    const interval = parseInt(localStorage.getItem('refreshInterval') || '60') * 1000;
    if (interval > 0) startAutoRefresh(interval);
  }
})();

// 定期更新刷新指示器
setInterval(() => {
  if (currentPage === 'live') updateRefreshIndicator();
}, 5000);
</script>
<script>
// ==================== 版本更新 ====================
async function checkAppVersion() {
  const result = document.getElementById('updateResult');
  result.textContent = '检查中...';
  result.style.color = 'var(--txt-muted)';

  // 获取当前版本
  let currentVersion = '?';
  try { 
    const info = JSON.parse(AndroidAlarm.getAppVersion());
    currentVersion = info.versionName;
  } catch(e) {}

  // 检查服务器版本
  const serverUrl = DATA_SERVER.url || localStorage.getItem('dataServerUrl') || '';
  if (!serverUrl) {
    result.innerHTML = '<span style="color:var(--warn)">请先配置服务器地址</span>';
    return;
  }

  try {
    const verInfo = JSON.parse(AndroidAlarm.checkForUpdate(serverUrl));
    if (verInfo.error) {
      result.innerHTML = `<span style="color:var(--danger)">${verInfo.error}</span>`;
      return;
    }
    if (verInfo.hasUpdate) {
      result.innerHTML = `
        <div style="background:var(--abg2);border:1px solid var(--accent);border-radius:8px;padding:10px;margin-top:6px">
          <div style="color:var(--accent);font-weight:600;margin-bottom:4px">发现新版本 v${verInfo.latestVersion}</div>
          <div style="color:var(--txt-muted);font-size:11px;margin-bottom:4px">当前: v${currentVersion} → 最新: v${verInfo.latestVersion}</div>
          <div style="color:var(--txt2);font-size:11px;margin-bottom:8px">${verInfo.changelog}</div>
          <button onclick="downloadNewVersion('${verInfo.downloadUrl}')" style="width:100%;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;cursor:pointer;font-weight:600">立即更新</button>
        </div>
      `;
    } else {
      result.innerHTML = `<span style="color:var(--success)">✓ 已是最新版本 v${currentVersion}</span>`;
    }
  } catch(e) {
    result.innerHTML = `<span style="color:var(--danger)">检查失败: ${e.message}</span>`;
  }
}

function downloadNewVersion(url) {
  try {
    AndroidAlarm.downloadUpdate(url);
  } catch(e) {
    alert('下载失败: ' + e.message);
  }
}</script>
<script src="capacitor-bridge.js"></script>
</body>
</html>
