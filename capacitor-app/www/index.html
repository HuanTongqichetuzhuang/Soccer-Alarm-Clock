<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="var(--bg)">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>足球闹钟Pro</title>
  <style>
    :root {
      --bg:#0a1628;--bg2:#1a2744;--bg3:#1a1a2e;--bg-end:#1a2744;--bg-nav:rgba(10,22,40,.98);--bg-header-end:#0f3460;
      --txt:#fff;--txt2:#ccc;--txt3:#eee;--txt-muted:#7f8c9a;--txt-dim:#5a6a7a;
      --accent:#00d4aa;--danger:#e74c3c;--success:#2ecc71;--warn:#f59e0b;--info:#3498db;--info2:#3b82f6;--purple:#a855f7;--gold:#f1c40f;
      --s02:rgba(255,255,255,.02);--s03:rgba(255,255,255,.03);--s04:rgba(255,255,255,.04);--s05:rgba(255,255,255,.05);--s06:rgba(255,255,255,.06);--s07:rgba(255,255,255,.07);--s08:rgba(255,255,255,.08);--s10:rgba(255,255,255,.1);--s12:rgba(255,255,255,.12);--s15:rgba(255,255,255,.15);--s20:rgba(255,255,255,.2);
      --abg:rgba(0,212,170,.15);--abg2:rgba(0,212,170,.08);--abg3:rgba(0,212,170,.2);--abg4:rgba(0,212,170,.1);--abg5:rgba(0,212,170,.12);--abg6:rgba(0,212,170,.18);--abg7:rgba(0,212,170,.03);--abdr:rgba(0,212,170,.25);--abdr2:rgba(0,212,170,.6);
      --dngbg:rgba(231,76,60,.04);--infbg:rgba(59,130,246,.15);
    }
    [data-theme="light"] {
      --bg:#f0f2f5;--bg2:#fff;--bg3:#fff;--bg-end:#e8ecf1;--bg-nav:rgba(255,255,255,.96);--bg-header-end:#e8f5f0;
      --txt:#1a1a2e;--txt2:#4a4a5a;--txt3:#333344;--txt-muted:#6b7280;--txt-dim:#9ca3af;
      --accent:#009a7a;--danger:#d32f2f;--success:#2e7d32;--warn:#e65100;--info:#1565c0;--info2:#1565c0;--purple:#7c3aed;--gold:#b8860b;
      --s02:rgba(0,0,0,.01);--s03:rgba(0,0,0,.02);--s04:rgba(0,0,0,.03);--s05:rgba(0,0,0,.04);--s06:rgba(0,0,0,.05);--s07:rgba(0,0,0,.06);--s08:rgba(0,0,0,.07);--s10:rgba(0,0,0,.08);--s12:rgba(0,0,0,.1);--s15:rgba(0,0,0,.12);--s20:rgba(0,0,0,.18);
      --abg:rgba(0,154,122,.1);--abg2:rgba(0,154,122,.06);--abg3:rgba(0,154,122,.16);--abg4:rgba(0,154,122,.08);--abg5:rgba(0,154,122,.1);--abg6:rgba(0,154,122,.14);--abg7:rgba(0,154,122,.04);--abdr:rgba(0,154,122,.3);--abdr2:rgba(0,154,122,.6);
      --dngbg:rgba(211,47,47,.04);--infbg:rgba(21,101,192,.1);
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
    .app{max-width:430px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,var(--bg),var(--bg-end));padding-bottom:90px}

    /* ── Header ── */
    .header{background:linear-gradient(135deg,var(--bg2),var(--bg-header-end));padding:14px 16px;border-bottom:2px solid var(--accent);display:flex;align-items:center;justify-content:space-between}
    .header-left h1{font-size:19px;font-weight:700;letter-spacing:.5px}
    .header-left h1 span{color:var(--accent)}
    .header-left p{color:var(--txt-muted);font-size:11px;margin-top:2px;display:flex;align-items:center;gap:6px}
    .live-dot{width:7px;height:7px;background:var(--success);border-radius:50%;display:inline-block;animation:pulse 1.5s infinite}
    .header-right{display:flex;gap:8px;align-items:center}
    .refresh-btn{background:rgba(0,212,170,.15);border:1px solid var(--accent);border-radius:10px;padding:8px 14px;color:var(--accent);font-size:12px;cursor:pointer;font-weight:600;transition:all .2s}
    .refresh-btn:active{transform:scale(.95)}
    .refresh-btn.loading{opacity:.6;pointer-events:none}

    /* ── Navigation ── */
    .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,22,40,.98);display:flex;border-top:1px solid rgba(255,255,255,.12);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .nav-item{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;color:var(--txt-muted);font-size:9px;transition:color .2s}
    .nav-item.active{color:var(--accent)}
    .nav-item svg{display:block;margin:0 auto 3px}

    /* ── Pages ── */
    .page{display:none;padding:14px 14px 0}.page.active{display:block}
    .section-title{font-size:15px;font-weight:700;margin:14px 0 10px;display:flex;align-items:center;gap:8px}
    .section-title .badge{font-size:10px;background:rgba(0,212,170,.2);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:500}

    /* ── League Tabs (懂球帝风格横滑导航) ── */
    .league-tabs{display:flex;gap:0;overflow-x:auto;padding:0 0 8px;scrollbar-width:none;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06)}
    .league-tabs::-webkit-scrollbar{display:none}
    .league-tab{display:inline-flex;align-items:center;gap:4px;padding:9px 14px;background:transparent;border-radius:0;font-size:12px;cursor:pointer;border:none;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .2s;flex-shrink:0;color:var(--txt-muted);font-weight:500}
    .league-tab.active{color:var(--accent);font-weight:700;border-bottom-color:var(--accent);background:transparent}
    .league-tab:active{background:rgba(255,255,255,.05)}
    .league-tab-logo{width:18px;height:18px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 0 1px rgba(255,255,255,.2))}
    .league-tab.active .league-tab-logo{filter:drop-shadow(0 0 2px rgba(0,212,170,.3))}

    /* ── Match Card (懂球帝风格横排) ── */
    .match-card{position:relative;display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);transition:background .2s;min-height:72px}
    .match-card:last-child{border-bottom:none}
    .match-card:active{background:rgba(255,255,255,.06)}
    .match-card.live{background:rgba(231,76,60,.04);border-left:3px solid var(--danger)}
    .match-card.fav{background:rgba(0,212,170,.03);border-left:3px solid var(--accent)}
    .match-side{display:flex;flex-direction:column;align-items:center;width:78px;flex-shrink:0;gap:4px}
    .match-side img{width:34px;height:34px;object-fit:contain}
    .match-side img.wc-flag{width:42px;height:28px;border-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.3)}
    .match-side-icon{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
    .match-side-name{font-size:11px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:76px;text-align:center;line-height:1.2}
    .match-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;gap:2px;padding:0 8px}
    .match-center-league{font-size:9px;color:var(--txt-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
    .match-center-score{font-size:20px;font-weight:800;color:var(--txt);letter-spacing:2px;line-height:1.2}
    .match-center-score.live{color:var(--danger)}
    .match-center-score.pending{color:var(--txt-muted);font-size:14px}
    .match-center-vs{font-size:14px;color:var(--txt-dim);font-weight:600}
    .match-center-sub{font-size:9px;color:var(--txt-muted);line-height:1.2}
    .match-center-sub.live-text{color:var(--success);font-weight:600}
    .match-center-sub.pending-text{color:var(--warn);font-weight:600}
    .match-alarm-btn{display:inline-flex;align-items:center;justify-content:center;gap:3px;padding:3px 10px;background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.25);border-radius:12px;color:var(--accent);font-size:10px;cursor:pointer;font-weight:600;margin-top:3px;transition:all .2s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
    .match-alarm-btn:active{transform:scale(.92);background:rgba(0,212,170,.2)}
    .match-alarm-btn.set{background:rgba(0,212,170,.18);border-color:rgba(0,212,170,.6);box-shadow:0 0 8px rgba(0,212,170,.15)}
    .match-alarm-btn.set:active{transform:scale(.92)}
    .match-alarm-btn svg{width:13px;height:13px;flex-shrink:0}
    /* 日期分组标题 */
    .date-group-title{font-size:11px;color:var(--txt-muted);background:rgba(255,255,255,.04);text-align:center;padding:7px 0;font-weight:600;border-bottom:1px solid rgba(255,255,255,.06)}
    .date-group-title:first-child{border-top:none}
    /* 联赛分组小标题 */
    .league-group-sub{font-size:10px;color:var(--txt-dim);padding:6px 12px 3px;font-weight:600;display:flex;align-items:center;gap:4px}
    /* 旧版兼容 */
    .match-header{display:none}
    .match-teams{display:none}
    .match-footer{display:none}
    .team{display:none}
    .team-logo{display:none}
    .team-name{display:none}
    .score-center{display:none}
    .score-display{display:none}
    .score-vs{display:none}
    .score-sub{display:none}
    .match-time-info{display:none}
    .live-badge{display:none}
    .finished-badge{display:none}
    .alarm-btn{display:none}

    /* ── Standings ── */
    .standings-table{background:rgba(255,255,255,.04);border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
    .standings-head{display:grid;grid-template-columns:32px 1fr 30px 30px 30px 30px 36px;gap:0;padding:10px 12px;background:rgba(0,212,170,.1);font-size:10px;color:var(--txt-muted);font-weight:600}
    .standings-row{display:grid;grid-template-columns:32px 1fr 30px 30px 30px 30px 36px;gap:0;padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center;font-size:12px;transition:background .2s}
    .standings-row:last-child{border-bottom:none}
    .standings-row:active{background:rgba(255,255,255,.05)}
    .st-rank{font-weight:700;color:var(--txt-muted);font-size:11px}
    .st-rank.top4{color:var(--accent)}
    .st-rank.top6{color:var(--info)}
    .st-rank.rel{color:var(--danger)}
    .st-rank.ucl-direct{color:var(--purple)}
    .st-rank.ucl-playoff{color:var(--warn)}
    .st-team{display:flex;align-items:center;gap:7px;min-width:0}
    .st-team img{width:20px;height:20px;object-fit:contain;border-radius:50%;flex-shrink:0}
    .st-team img.wc-flag{border-radius:3px;width:26px;height:17px}
    .st-team-icon{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
    .st-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
    .st-pts{font-weight:700;color:var(--accent);text-align:right}
    .st-num{color:var(--txt2);text-align:center}
    .st-desc{font-size:9px;color:var(--txt-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── Scorers ── */
    .scorer-card{background:rgba(255,255,255,.06);border-radius:14px;padding:13px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.05)}
    .scorer-rank{font-size:18px;font-weight:800;color:var(--accent);min-width:28px;text-align:center}
    .scorer-rank.g{color:var(--gold)}
    .scorer-info{flex:1;min-width:0}
    .scorer-name{font-size:13px;font-weight:600;margin-bottom:3px}
    .scorer-team{font-size:11px;color:var(--txt-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .scorer-goals{font-size:22px;font-weight:800;color:var(--txt);white-space:nowrap}
    .scorer-goals span{font-size:12px;color:var(--txt-muted);font-weight:400;margin-left:3px}

    /* ── Team Selection ── */
    .fav-empty{text-align:center;padding:40px 20px;color:var(--txt-muted);font-size:14px}
    .fav-empty .icon{font-size:48px;margin-bottom:12px}
    .team-search{padding:0 0 12px}
    .team-search input{width:100%;padding:11px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);border-radius:25px;color:var(--txt);font-size:14px;outline:none}
    .team-search input::placeholder{color:var(--txt-muted)}
    .team-search input:focus{border-color:var(--accent)}
    .team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
    .team-item{background:rgba(255,255,255,.07);border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s}
    .team-item.selected{border-color:var(--accent);background:rgba(0,212,170,.12)}
    .team-item:active{transform:scale(.95)}
    .team-item-logo{width:40px;height:40px;margin:0 auto 6px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;position:relative}
    .team-item-logo.wc-team-logo{border-radius:6px;width:48px;height:32px}
    .team-item-logo img{width:100%;height:100%;object-fit:contain}
    .team-item-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--txt2)}
    .team-item-name{font-size:10px;color:var(--txt2);line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

    /* ── Team Detail Overlay ── */
    .team-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999;opacity:0;visibility:hidden;transition:opacity .3s}
    .team-overlay.active{opacity:1;visibility:visible}
    .team-detail{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg3);z-index:1000;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;-webkit-overflow-scrolling:touch}
    .team-detail.active{transform:translateX(0)}
    .team-detail-header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg3) 80%,transparent);padding:16px;display:flex;align-items:center;gap:14px}
    .team-detail-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;border:none;color:var(--txt);flex-shrink:0}
    .team-detail-back:active{background:rgba(255,255,255,.2)}
    .team-detail-logo{width:52px;height:52px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0}
    .team-detail-logo img{width:100%;height:100%;object-fit:contain}
    .team-detail-info{flex:1;min-width:0}
    .team-detail-name{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:2px}
    .team-detail-league{font-size:12px;color:var(--txt-muted)}
    .team-detail-fav-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;border:none;color:var(--txt);flex-shrink:0;transition:all .2s}
    .team-detail-fav-btn.is-fav{background:rgba(0,212,170,.2);color:var(--accent)}
    .team-detail-fav-btn:active{transform:scale(.9)}
    .team-detail-section{padding:0 16px 16px}
    .team-detail-section-title{font-size:13px;font-weight:700;color:var(--txt-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .team-detail-section-title .count{background:rgba(255,255,255,.1);padding:1px 8px;border-radius:10px;font-size:11px}
    .team-match-item{background:rgba(255,255,255,.05);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .team-match-item .opp-badge{width:30px;height:30px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .team-match-item .opp-badge img{width:100%;height:100%;object-fit:contain}
    .team-match-item .match-info{flex:1;min-width:0}
    .team-match-item .match-opp{font-size:13px;font-weight:600;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .team-match-item .match-meta{font-size:11px;color:var(--txt-muted);margin-top:2px}
    .team-match-item .match-score{font-size:15px;font-weight:700;flex-shrink:0;min-width:60px;text-align:center}
    .team-match-item .match-score.win{color:var(--accent)}
    .team-match-item .match-score.draw{color:var(--warn)}
    .team-match-item .match-score.lose{color:var(--danger)}
    .team-match-item .match-score.upcoming{color:var(--txt-muted);font-size:13px}
    .team-match-item .match-home-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(0,212,170,.15);color:var(--accent);margin-left:4px}
    .team-match-item .match-away-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(59,130,246,.15);color:var(--info2);margin-left:4px}
    .team-match-item-v2{background:rgba(255,255,255,.05);border-radius:12px;padding:10px 12px;margin-bottom:8px}
    .team-match-item-v2 .match-teams-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
    .team-match-item-v2 .team-cell{flex:1;display:flex;align-items:center;gap:6px;min-width:0}
    .team-match-item-v2 .team-cell.home{flex-direction:row}
    .team-match-item-v2 .team-cell.away{flex-direction:row-reverse;text-align:right}
    .team-match-item-v2 .my-team-cell{opacity:1}
    .team-match-item-v2 .team-cell:not(.my-team-cell){opacity:.65}
    .team-match-item-v2 .team-badge-small{width:24px;height:24px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
    .team-match-item-v2 .team-badge-small img{width:100%;height:100%;object-fit:contain}
    .team-match-item-v2 .team-name-small{font-size:12px;font-weight:600;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .team-match-item-v2 .vs-cell{text-align:center;flex-shrink:0;padding:0 6px;min-width:65px}
    .team-match-item-v2 .match-score-full{font-size:15px;font-weight:700;text-align:center}
    .team-match-item-v2 .match-score-full .my-team{color:var(--accent)}
    .team-match-item-v2 .match-score-full.live{color:var(--danger)}
    .team-match-item-v2 .match-score-full.upcoming{color:var(--txt-muted);font-size:13px}
    .team-match-item-v2 .match-home-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(0,212,170,.15);color:var(--accent);display:block;margin-top:2px}
    .team-match-item-v2 .match-away-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(59,130,246,.15);color:var(--info2);display:block;margin-top:2px}
    .team-match-item-v2 .match-meta-row{font-size:11px;color:var(--txt-muted);margin-top:6px;text-align:center}
    .team-match-item-v2 .td-alarm-btn{margin-top:6px;display:flex;justify-content:center}
    .td-alarm-btn{display:inline-flex;align-items:center;justify-content:center;gap:2px;padding:4px 8px;background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.25);border-radius:10px;color:var(--accent);font-size:9px;cursor:pointer;font-weight:600;flex-shrink:0;transition:all .2s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
    .td-alarm-btn:active{transform:scale(.92);background:rgba(0,212,170,.2)}
    .td-alarm-btn.set{background:rgba(0,212,170,.18);border-color:rgba(0,212,170,.6);box-shadow:0 0 6px rgba(0,212,170,.15)}
    .td-alarm-btn.set:active{transform:scale(.92)}
    .td-alarm-btn svg{width:11px;height:11px;flex-shrink:0}

    /* ── Alarm List ── */
    .alarm-item{background:rgba(255,255,255,.06);border-radius:14px;padding:13px;margin-bottom:8px;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.05)}
    .alarm-icon{width:36px;height:36px;background:rgba(0,212,170,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .alarm-icon.custom{background:rgba(245,158,11,.15)}
    .alarm-info{flex:1;min-width:0}
    .alarm-match{font-size:12px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .alarm-time{font-size:11px;color:var(--txt-muted)}
    .alarm-del{color:var(--danger);font-size:20px;cursor:pointer;padding:4px;border:none;background:none;line-height:1}

    /* ── Custom Alarm ── */
    .custom-alarm-card{background:rgba(255,255,255,.06);border-radius:16px;padding:16px;margin-bottom:14px;border:1px solid rgba(245,158,11,.2)}
    .custom-alarm-card h3{font-size:14px;font-weight:700;color:var(--warn);margin-bottom:14px;display:flex;align-items:center;gap:6px}
    .form-row{margin-bottom:12px}
    .form-label{font-size:11px;color:var(--txt-muted);margin-bottom:5px}
    .form-input{width:100%;padding:10px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:var(--txt);font-size:14px;outline:none}
    .form-input:focus{border-color:var(--accent)}
    .repeat-grid{display:flex;gap:6px;flex-wrap:wrap}
    .repeat-btn{padding:6px 12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--txt2);font-size:12px;cursor:pointer;transition:all .2s}
    .repeat-btn.active{background:rgba(0,212,170,.2);border-color:var(--accent);color:var(--accent)}
    .add-alarm-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#00a88a);border:none;border-radius:12px;color:var(--bg);font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
    .add-alarm-btn:active{transform:scale(.98)}
    .test-alarm-btn{width:100%;padding:10px;background:rgba(255,140,0,.15);border:1px solid rgba(255,140,0,.4);border-radius:10px;color:#ff9f00;font-size:13px;cursor:pointer;margin-top:6px}
    .test-alarm-btn:active{background:rgba(255,140,0,.25)}

    /* ── Legend ── */
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;font-size:10px;color:var(--txt-muted)}
    .legend-item{display:flex;align-items:center;gap:4px}
    .legend-dot{width:8px;height:8px;border-radius:50%}

    /* ── Loading ── */
    .loading-wrap{text-align:center;padding:40px 20px;color:var(--txt-muted)}
    .spinner{width:30px;height:30px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
    .loading-text{font-size:12px}
    .error-wrap{text-align:center;padding:30px 20px;color:var(--txt-muted)}
    .retry-btn{margin-top:12px;padding:8px 20px;background:rgba(0,212,170,.15);border:1px solid var(--accent);border-radius:10px;color:var(--accent);font-size:13px;cursor:pointer;font-weight:600}

    /* ── Toast ── */
    .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(10,22,40,.95);border:1px solid var(--accent);color:var(--accent);padding:10px 20px;border-radius:25px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:300px;text-align:center}
    .toast.show{opacity:1}

    /* ── Info Banner ── */
    .info-banner{background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.2);border-radius:12px;padding:11px 14px;margin-bottom:12px;font-size:11px;color:var(--txt-muted);line-height:1.7}
    .info-banner b{color:var(--accent)}
    .info-banner.ucl{background:rgba(168,85,247,.06);border-color:rgba(168,85,247,.2)}
    .info-banner.ucl b{color:var(--purple)}

    /* ── Animations ── */
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .anim{animation:fadeIn .25s ease-out}

    /* ── Ringtone Preview (铃声试听) ── */
    .ringtone-item{padding:10px 12px;margin-bottom:6px;background:rgba(255,255,255,.05);border-radius:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(255,255,255,.08);transition:all .2s}
    .ringtone-item.selected{background:rgba(0,212,170,.12);border-color:var(--accent)}
    .ringtone-item.playing{background:rgba(244,67,54,.06);border-color:rgba(244,67,54,.3)}
    .ringtone-item:active{transform:scale(.98)}
    .ringtone-info{flex:1;min-width:0}
    .ringtone-name{font-size:13px;font-weight:400;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ringtone-item.selected .ringtone-name{font-weight:700}
    .ringtone-source{font-size:10px;color:var(--txt-muted);margin-top:2px}
    .ringtone-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .ringtone-check{color:var(--accent);font-size:14px;font-weight:700}
    .ringtone-preview-btn{width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:#aaa;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .ringtone-preview-btn.active{background:rgba(244,67,54,.2);color:#f44336}
    .ringtone-preview-btn:active{transform:scale(.9)}

    /* 音量控制面板 */
    .volume-control-panel{margin-top:10px;padding:12px 14px;background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.2);border-radius:12px;animation:fadeIn .25s ease-out}
    .volume-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .volume-icon{font-size:16px}
    .volume-label{font-size:12px;color:var(--txt-muted);flex:1}
    .volume-value{font-size:13px;color:var(--accent);font-weight:700}
    .volume-slider-wrap{padding:0 4px}
    .volume-slider{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.1);border-radius:3px;outline:none;cursor:pointer}
    .volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(0,212,170,.4)}
    .volume-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
    .volume-actions{margin-top:10px;display:flex;justify-content:center}
    .volume-btn{padding:8px 20px;border-radius:10px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
    .volume-btn:active{transform:scale(.95)}
    .stop-btn{background:rgba(244,67,54,.15);border:1px solid rgba(244,67,54,.4);color:#f44336}

    /* 铃声折叠菜单 */
    .ringtone-collapse-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(255,255,255,.05);cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);-webkit-tap-highlight-color:transparent;transition:background .2s}
    .ringtone-collapse-header:active{background:rgba(255,255,255,.1)}
    .ringtone-collapse-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--txt3)}
    .ringtone-collapse-arrow{font-size:11px;color:var(--txt-muted);transition:transform .3s}
    .ringtone-collapse-header.expanded .ringtone-collapse-arrow{transform:rotate(90deg)}
    .ringtone-collapse-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
    .ringtone-collapse-body.expanded{max-height:2000px}
    /* 系统铃声选择按钮 */
    .system-ringtone-btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px;margin-bottom:6px;background:rgba(66,133,244,.08);border:1px solid rgba(66,133,244,.25);border-radius:10px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .system-ringtone-btn:active{transform:scale(.98);background:rgba(66,133,244,.15)}
    .system-ringtone-btn .sr-icon{width:36px;height:36px;border-radius:10px;background:rgba(66,133,244,.15);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .system-ringtone-btn .sr-info{flex:1;min-width:0;text-align:left}
    .system-ringtone-btn .sr-title{font-size:13px;font-weight:600;color:var(--txt3)}
    .system-ringtone-btn .sr-desc{font-size:10px;color:var(--txt-muted);margin-top:2px}
    .system-ringtone-btn .sr-check{color:var(--accent);font-size:14px;font-weight:700}
    .system-ringtone-btn.has-custom{border-color:rgba(0,212,170,.3);background:rgba(0,212,170,.06)}
    /* 主队比赛折叠组 */
    .fav-team-group{margin-bottom:8px;border-radius:14px;overflow:hidden;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .fav-team-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .2s}
    .fav-team-header:active{background:rgba(255,255,255,.06)}
    .fav-team-header-left{display:flex;align-items:center;gap:10px}
    .fav-team-name{font-size:14px;font-weight:700;color:var(--txt3)}
    .fav-team-count{font-size:11px;color:var(--txt-muted);background:rgba(255,255,255,.08);padding:2px 8px;border-radius:10px}
    .fav-team-arrow{color:var(--txt-muted);font-size:12px;transition:transform .25s ease}
    .fav-team-body{padding:0 8px 8px}
    .fav-team-body .match-card{margin-bottom:6px}
  
    .theme-toggle-btn{background:var(--s08);border:1px solid var(--s12);border-radius:10px;padding:6px 8px;color:var(--txt);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
    .theme-toggle-btn:active{transform:scale(.9);background:var(--s15)}

  </style>
</head>
<body>
<!-- 错误调试面板 -->
<div id="initError" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a0000;color:#ff4444;padding:16px;font-size:12px;font-family:monospace;white-space:pre-wrap;max-height:50vh;overflow-y:auto;border-bottom:3px solid #ff4444"></div>
<div class="app">
  <!-- Header -->

      <p><span class="live-dot"></span>自动联网 · 实时数据</p>
    </div>
    <div class="header-right">
          <button class="theme-toggle-btn" onclick="toggleTheme()" title="切换浅色/深色模式"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    <button onclick="showServerSettings()" style="background:var(--s08);border:1px solid var(--s12);border-radius:10px;padding:6px 8px;color:var(--txt);cursor:pointer;font-size:16px;display:flex;align-items:center;transition:all .2s" title="数据服务设置">⚙</button>
<button class="refresh-btn" id="refreshBtn" onclick="refreshCurrentPage()">🔄 刷新</button>
    </div>
  </div>

  <!-- Pages -->
  <!-- 1. 赛程 -->
  <div class="page active" id="page-schedule">
    <div class="league-tabs" id="scheduleTabs"></div>
    <!-- 日期选择器 -->
    <div style="padding:8px 16px;display:flex;align-items:center;gap:8px;">
      <input type="date" id="scheduleDate" style="flex:1;padding:8px 12px;background:var(--s08);border:1px solid var(--s12);border-radius:10px;color:var(--txt);font-size:13px;" onchange="onDateChange()">
      <button onclick="goToToday()" style="padding:8px 14px;background:var(--abg);border:1px solid var(--accent);border-radius:10px;color:var(--accent);font-size:12px;cursor:pointer;">今天</button>

  <!-- 2. 直播 -->

      </div>

        <div class="form-label">时间</div>
        <input class="form-input" id="customAlarmTime" type="time" value="19:45">
      </div>
      <div class="form-row">
        <div class="form-label">重复</div>
        <div class="repeat-grid" id="repeatGrid">
          <div class="repeat-btn" data-day="1" onclick="toggleRepeat(this)">周一</div>
          <div class="repeat-btn" data-day="2" onclick="toggleRepeat(this)">周二</div>
          <div class="repeat-btn" data-day="3" onclick="toggleRepeat(this)">周三</div>
          <div class="repeat-btn" data-day="4" onclick="toggleRepeat(this)">周四</div>
          <div class="repeat-btn" data-day="5" onclick="toggleRepeat(this)">周五</div>
          <div class="repeat-btn" data-day="6" onclick="toggleRepeat(this)">周六</div>
          <div class="repeat-btn" data-day="0" onclick="toggleRepeat(this)">周日</div>

    <!-- Ringtone Selection (可折叠) -->
    <div class="ringtone-collapse-header" id="ringtoneCollapseHeader" onclick="toggleRingtonePanel()">

        </div>

      </div>

    <!-- Match Alarms -->
    <div class="section-title">⭐ 比赛提醒 <span class="badge" id="matchAlarmCount">0</span></div>

<!-- 球队详情浮层 -->
<div class="team-overlay" id="teamOverlay" onclick="closeTeamDetail()"></div>
<div class="team-detail" id="teamDetail">

// ==================== 时区转换工具 ====================
// 判断欧洲夏令时（3月最后一个周日 01:00 UTC → 10月最后一个周日 01:00 UTC）
function isEuropeanDST(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z'); // 用UTC中午判断，避免跨天问题
  const year = d.getUTCFullYear();
  // 3月最后一个周日
  let marLast = new Date(Date.UTC(year, 2, 31));
  while (marLast.getUTCDay() !== 0) marLast.setUTCDate(marLast.getUTCDate() - 1);
  // 10月最后一个周日
  let octLast = new Date(Date.UTC(year, 9, 31));
  while (octLast.getUTCDay() !== 0) octLast.setUTCDate(octLast.getUTCDate() - 1);
  // 夏令时：3月最后一个周日01:00 UTC → 10月最后一个周日01:00 UTC
  const dstStart = marLast.getTime() + 1 * 3600000;
  const dstEnd = octLast.getTime() + 1 * 3600000;
  return d.getTime() >= dstStart && d.getTime() < dstEnd;
}

// 将欧洲当地时间转换为北京时间
// dateStr: '2025-08-16', timeStr: '15:00', leagueId: 'PL'
// 返回: { date: '2025-08-16', time: '22:00', timestamp: ... }
function localToBJ(dateStr, timeStr, leagueId) {
  const lg = FOOTBALL_LEAGUES[leagueId];
  if (!lg) {
    // 未知联赛，直接当北京时间
    const d = new Date(dateStr + 'T' + (timeStr || '15:00') + ':00+08:00');
    return { date: dateStr, time: timeStr || '15:00', timestamp: d.getTime() };
  }

  // 世界杯数据已经是北京时间，直接解析
  if (leagueId === 'WC') {
    const d = new Date(dateStr + 'T' + (timeStr || '15:00') + ':00+08:00');
    return { date: dateStr, time: timeStr || '15:00', timestamp: d.getTime() };
  }

  // 五大联赛+欧冠(openfootball)：将欧洲当地时间转为北京时间
  // 注：欧冠(fixturedownload)数据已在fetchCLMatches中转为北京时间，不会走到这里
  const utcOffset = lg.utcOffset || 0; // 标准UTC偏移（冬令时）
  const dst = isEuropeanDST(dateStr);
  const actualOffset = dst ? utcOffset + 1 : utcOffset; // 夏令时+1
  const bjOffset = 8; // 北京时间 UTC+8
  const diffHours = bjOffset - actualOffset; // 需要加的小时数

  // 将当地时间解析为UTC，然后加偏移得到北京时间
  // 例：英超15:00 UK → 解析为15:00 UTC → 加8h=23:00 北京
  const [h, m] = (timeStr || '15:00').split(':').map(Number);
  const localMs = new Date(dateStr + 'T00:00:00Z').getTime() + h * 3600000 + m * 60000;
  const bjMs = localMs + diffHours * 3600000;
  const bjDate = new Date(bjMs);

  // 提取北京时间的日期和时间
  const bjDateStr = bjDate.toISOString().slice(0, 10);
  const bjTimeStr = bjDate.toISOString().slice(11, 16);

  return { date: bjDateStr, time: bjTimeStr, timestamp: bjMs };
}

// 获取中文队名
function getTeamCn(enName) {
  if (!enName) return enName || '';
  // 精确匹配
  if (TEAM_CN[enName]) return TEAM_CN[enName];
  // 去掉欧冠队名的括号后缀，如 "Arsenal FC (ENG)" → "Arsenal FC"
  const stripped = enName.replace(/\s*\([A-Z]{3}\)\s*$/, '').trim();
  if (stripped !== enName && TEAM_CN[stripped]) return TEAM_CN[stripped];
  // 模糊匹配
  for (const key in TEAM_CN) {
    if (enName.includes(key) || key.includes(enName)) {
      return TEAM_CN[key];
    }
  }
  // 模糊匹配（去掉括号后再试）
  if (stripped !== enName) {
    for (const key in TEAM_CN) {
      if (stripped.includes(key) || key.includes(stripped)) {
        return TEAM_CN[key];
      }
    }
  }
  // 世界杯国家队：直接返回中文（如果已有映射），否则返回原名
  return enName;
}

  }
  // 模糊匹配（去掉括号后再试）
  if (stripped !== enName) {

// 从fixturedownload.com获取世界杯数据
async function fetchWCFromApi() {
  const res = await fetchWithTimeout(WC_API_URL, 15000);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  const rawMatches = JSON.parse(text);
  if (!rawMatches || !Array.isArray(rawMatches) || rawMatches.length === 0) {
    throw new Error('空数据');
  }

  const now = new Date();
  return rawMatches.map((m, i) => {
    // fixturedownload返回UTC时间，需转北京时间
    const utcDate = new Date(m.DateUtc + 'Z');
    const bjDate = new Date(utcDate.getTime() + 8 * 60 * 60 * 1000);
    const dateStr = bjDate.toISOString().slice(0, 10);
    const timeStr = bjDate.toTimeString().slice(0, 5);
    const matchTs = bjDate.getTime();

    // 判断状态
    const hasScore = m.HomeTeamScore !== null && m.AwayTeamScore !== null;
    const diffMin = (now - bjDate) / 60000;
    const isLive = !hasScore && diffMin >= 0 && diffMin < 120;
    const isFinished = hasScore || diffMin >= 120;

    // 队名处理：fixturedownload格式
    const homeTeam = m.HomeTeam || 'TBD';
    const awayTeam = m.AwayTeam || 'TBD';

    return {
      id: `wc_2026_api_${i}`,
      date: dateStr,
      time: timeStr,
      team1: homeTeam,
      team2: awayTeam,
      homeCn: getTeamCn(homeTeam),
      awayCn: getTeamCn(awayTeam),
      homeBadge: getTeamBadge(homeTeam),
      awayBadge: getTeamBadge(awayTeam),
      homeScore: hasScore ? m.HomeTeamScore : null,
      awayScore: hasScore ? m.AwayTeamScore : null,
      isLive: isLive,
      isFinished: isFinished,
      round: m.Group ? `${m.Group}` : `Round ${m.RoundNumber}`,
      timestamp: matchTs,
      leagueId: 'WC'
    };
  });
}

function saveState() {

    }));
  } catch(e) {}

function cacheSet(key, data, ttl) {
  cachedData[key] = {data, ts: Date.now(), ttl: ttl || 120000}; // 默认2分钟
  saveState();
}
function cacheGet(key) {
  const c = cachedData[key];
  if (c && (Date.now() - c.ts) < (c.ttl||120000)) return c.data; // 默认2分钟
  return null;
}

// ==================== HTTP ====================
// 兼容旧版 Android WebView 的超时实现（不用 AbortSignal.timeout）
function fetchWithTimeout(url, ms) {
  ms = ms || 12000;
  return new Promise(function(resolve, reject) {
    var done = false;
    var timer = setTimeout(function() {
      if (!done) { done = true; reject(new Error('timeout')); }
    }, ms);
    fetch(url).then(function(r) {
      if (!done) { done = true; clearTimeout(timer); resolve(r); }
    }).catch(function(e) {
      if (!done) { done = true; clearTimeout(timer); reject(e); }
    });
  });
}

async function httpGet(url, cacheKey, ttl) {
  if (cacheKey) {
    const cached = cacheGet(cacheKey);
    if (cached) return cached;
  }
  try {
    const res = await fetchWithTimeout(url, 12000);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (cacheKey) cacheSet(cacheKey, data, ttl);
    return data;
  } catch(e) {
    // 返回过期缓存兜底
    if (cacheKey && cachedData[cacheKey]) return cachedData[cacheKey].data;
    throw e;
  }
}

// 优先级：1. openfootball champions-league 仓库 (cl.txt) → 2. openfootball football.json CDN → 3. 本地静态数据
// 新增：从 openfootball champions-league 仓库的 cl.txt 格式解析欧冠数据
// 数据源：https://cdn.jsdelivr.net/gh/openfootball/champions-league@master/2025-26/cl.txt
// 格式说明：» 开头为轮次，日期行，比赛行含比分/半场/a.e.t.，CC0 公共领域，无需 API Key
const CL_TXT_CDN = 'https://cdn.jsdelivr.net/gh/openfootball/champions-league@master';

async function fetchCLFromOpenfootballTxt() {
  const seasons = ['2025-26', '2024-25'];
  for (const season of seasons) {
    try {
      const url = `${CL_TXT_CDN}/${season}/cl.txt`;
      console.log('[CL] 请求openfootball cl.txt:', url);
      const res = await fetchWithTimeout(url, 15000);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const matches = parseCLTxt(text, season);
      if (matches && matches.length > 0) {
        console.log('[CL] openfootball cl.txt解析成功:', matches.length + '场');
        return matches;
      }
    } catch(e) {
      console.log('[CL] openfootball cl.txt赛季 ' + season + ' 不可用:', e.message);
    }
  }
  return [];
}

// 解析 openfootball cl.txt 结构化文本格式
// 格式说明：同时段多场比赛只有第一场标注时间，后续行省略时间用空格对齐队名
function parseCLTxt(text, season) {
  const matches = [];
  const lines = text.split('\n');
  let currentRound = '';
  let currentDate = '';
  let currentTime = ''; // 追踪当前时间（同时间段多场比赛共用）
  let currentYear = season.split('-')[0]; // 从赛季推断年份，如 '2025-26' → '2025'

  // 月份映射
  const MONTH_MAP = {
    'Jan':'01','Feb':'02','Mar':'03','Apr':'04','May':'05','Jun':'06',
    'Jul':'07','Aug':'08','Sep':'09','Oct':'10','Nov':'11','Dec':'12'
  };

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();

    // 空行跳过
    if (!line) continue;

    // 轮次行：» League, Matchday 1 / » Finals, Semifinals / » Finals, Final
    if (line.startsWith('»')) {
      currentRound = line.substring(1).trim();
      continue;
    }

    // 日期行：Tue Sep/16 2025 或 Wed Sep/17（无年份时用当前年份推断）
    // 也可能是 # 开头的注释行
    if (line.startsWith('#')) continue;

    const dateMatch = line.match(/^(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+([A-Z][a-z]{2})\/(\d{1,2})(?:\s+(\d{4}))?$/);
    if (dateMatch) {
      const month = MONTH_MAP[dateMatch[1]];
      const day = dateMatch[2].padStart(2, '0');
      const year = dateMatch[3] || currentYear;
      if (month) {
        currentDate = year + '-' + month + '-' + day;
        // 如果日期跨年了（如1月的比赛属于下一自然年），修正年份
        if (month === '01' || month === '02' || month === '03' || month === '04' || month === '05') {
          // 淘汰赛阶段在次年，年份应为赛季起始年+1
          const seasonStart = parseInt(season.split('-')[0]);
          const nextYear = seasonStart + 1;
          currentDate = nextYear + '-' + month + '-' + day;
        }
      }
      continue;
    }

    // 比赛行（含时间）：  21.00  Team1 (Country)     v Team2 (Country)  2-1 (1-1)
    // 比赛行（省略时间，同上时段）：         Team1 (Country)     v Team2 (Country)  2-1 (1-1)
    // 先尝试匹配含时间的行
    const matchWithTime = line.match(/^(\d{1,2}\.\d{2})\s+(.+?)\s+v\s+(.+?)$/);
    // 再尝试匹配省略时间的行（以队名开头，不含时间前缀）
    const matchNoTime = line.match(/^([A-Z\u00C0-\u024F].+?)\s+v\s+(.+?)$/);

    let m = null;
    let matchTime = '';
    if (matchWithTime) {
      m = matchWithTime;
      matchTime = m[1].replace('.', ':'); // 21.00 → 21:00
      currentTime = matchTime; // 更新当前时间追踪
    } else if (matchNoTime && currentTime) {
      // 省略时间的行，使用上一个时间
      m = [null, null, matchNoTime[1], matchNoTime[2]];
      matchTime = currentTime;
    }

    if (m && currentDate) {
      let team1Raw = (m[2] || '').trim();
      let team2Raw = (m[3] || '').trim();

      // 去掉队名中的国家后缀，如 "Arsenal FC (ENG)" → "Arsenal FC"
      team1Raw = team1Raw.replace(/\s*\([A-Z]{3}\)\s*$/, '').trim();
      team2Raw = team2Raw.replace(/\s*\([A-Z]{3}\)\s*$/, '').trim();

      // 从 " v " 之后的内容中分离队名和比分
      const afterV = line.substring(line.indexOf(' v ') + 3);
      const team2AndScore = afterV.trim();

      let homeScore = null, awayScore = null;

      // 比分匹配：2-1 / 3-2 a.e.t. / 4-4 (0-0) / 3-2 a.e.t. (3-0, 1-0)
      const scoreOnlyRe = /\s{2,}(\d{1,2})-(\d{1,2})\s*(a\.e\.t\.)?\s*(?:\([^)]*\))?\s*$/;
      const scoreMatch = team2AndScore.match(scoreOnlyRe);

      if (scoreMatch) {
        homeScore = parseInt(scoreMatch[1]);
        awayScore = parseInt(scoreMatch[2]);
        // 重新提取纯队名（去掉比分部分）
        const pureTeam2 = team2AndScore.substring(0, team2AndScore.indexOf(scoreMatch[0])).trim();
        team2Raw = pureTeam2.replace(/\s*\([A-Z]{3}\)\s*$/, '').trim();
      } else {
        // 无比分，清理可能的残留
        team2Raw = team2Raw.replace(/\s{2,}.*$/, '').trim();
        team2Raw = team2Raw.replace(/\s*\([A-Z]{3}\)\s*$/, '').trim();
      }

      // N.N. 表示待定球队
      if (team1Raw === 'N.N.') team1Raw = 'TBD';
      if (team2Raw === 'N.N.') team2Raw = 'TBD';

      // 时区转换：cl.txt 中的时间为欧洲中部时间（CET/CEST）
      const bj = localToBJ(currentDate, matchTime, 'CL');
      const isFinished = homeScore !== null && awayScore !== null;

      matches.push({
        id: ('cl_txt_' + currentDate + '_' + team1Raw + '_' + team2Raw).replace(/\s/g, '_'),
        date: bj.date,
        time: bj.time,
        team1: team1Raw,
        team2: team2Raw,
        homeCn: getTeamCn(team1Raw),
        awayCn: getTeamCn(team2Raw),
        homeBadge: getTeamBadge(team1Raw),
        awayBadge: getTeamBadge(team2Raw),
        homeScore: homeScore,
        awayScore: awayScore,
        isLive: false,
        isFinished: isFinished,
        round: currentRound,
        timestamp: bj.timestamp,
        leagueId: 'CL'
      });
    }
  }
  return matches;
}

  const txtMatches = await fetchCLFromOpenfootballTxt();

// 缓存所有联赛数据
let allLeagueData = null;
let leagueDataCacheTime = 0;
const LEAGUE_CACHE_TTL = 5 * 60 * 1000; // 5分钟缓存（缩短以提高更新及时性）

// 加载所有联赛数据（一次加载，全部缓存）
async function loadAllLeagueData() {
  const now = Date.now();
  if (allLeagueData && (now - leagueDataCacheTime) < LEAGUE_CACHE_TTL) {
    return allLeagueData;
  }
  
  try {
    const data = await httpGet(FOOTBALL_CDN, 'all_leagues', 24 * 60 * 60 * 1000);
    allLeagueData = data;
    leagueDataCacheTime = now;
    return data;
  } catch (e) {
    console.error('加载联赛数据失败:', e);
    throw e;
  }
}

// 获取指定联赛的赛程
async function fetchNextMatches(leagueId) {
  const lg = FOOTBALL_LEAGUES[leagueId];
  if (!lg) return [];

  // 世界杯：使用 fixturedownload.com API（2026世界杯完整数据，国内可访问）
  if (lg.wcApi) {
    return fetchWCMatches();
  }

  // 欧冠：使用 openfootball champions-league 仓库（CC0公共领域，无需API Key）
  if (lg.clApi) {
    const matches = await fetchCLMatches();
    // 写入缓存，使 renderMyMatches/renderTodayMatches 能搜索到欧冠比赛
    if (matches && matches.length > 0) {
      cachedData['league_CL'] = { data: { matches: matches }, ts: Date.now() };
    }
    return matches;
  }

  // 国内杯赛：使用7m.com.cn静态数据（北京时间）
  if (lg.cupData) {
    const matches = fetchCupMatches(leagueId);
    // 写入缓存，使 renderMyMatches/renderTodayMatches 能搜索到杯赛比赛
    if (matches && matches.length > 0) {
      cachedData['league_' + leagueId] = { data: { matches: matches }, ts: Date.now() };
    }
    return matches;
  }

  try {
    const season = lg.season || FOOTBALL_SEASON;
    const url = `${FOOTBALL_CDN}/${season}/${lg.file}`;
    const data = await httpGet(url, `league_${leagueId}_${season}`, 5 * 60 * 1000);
    if (!data || !data.matches) return [];

    const matches = [];
    data.matches.forEach(m => {
      // 将欧洲当地时间转换为北京时间
      const bj = localToBJ(m.date, m.time || '15:00', leagueId);
      const homeScore = m.score && m.score.ft ? m.score.ft[0] : null;
      const awayScore = m.score && m.score.ft ? m.score.ft[1] : null;
      const isFinished = homeScore !== null && awayScore !== null;

      matches.push({
        id: `${lg.file}_${m.date}_${m.team1}_${m.team2}`.replace(/\s/g, '_'),
        date: bj.date, time: bj.time,
        team1: m.team1, team2: m.team2,
        homeCn: getTeamCn(m.team1), awayCn: getTeamCn(m.team2),
        homeBadge: getTeamBadge(m.team1), awayBadge: getTeamBadge(m.team2),
        homeScore, awayScore, isLive: false, isFinished,
        round: m.round || '', timestamp: bj.timestamp, leagueId
      });
    });
    
    return matches;
  } catch (e) {
    console.error('fetchNextMatches error:', e);
    return [];
  }
}

// ==================== 实时比分 - 基于赛程时间估算（国内可访问）====================
// 根据赛程时间估算正在进行和刚结束的比赛（无需外网API）
async function estimateLiveMatches() {
  const allMatches = [];
  const leagueIds = ['PL', 'PD', 'SA', 'BL1', 'FL1', 'CL', 'WC', 'FAC', 'LC', 'DFB', 'CDR', 'CDF'];

  for (const leagueId of leagueIds) {
    try {
      const matches = await fetchNextMatches(leagueId);
      const now = new Date();
      
      matches.forEach(m => {
        // fetchNextMatches返回的date/time已是北京时间，用+08:00解析
        const matchTime = new Date(m.date + 'T' + (m.time || '15:00') + ':00+08:00');
        const diffMs = now - matchTime;
        const diffMin = diffMs / 60000;
        
        // 比赛开始后0-105分钟 → 进行中（90分钟+15分钟中场休息）
        if (diffMin >= 0 && diffMin < 105) {
          // 如果有比分数据则显示，否则显示0:0并标注待更新
          const hasScore = m.homeScore !== null && m.homeScore !== undefined;
          allMatches.push({
            id: m.id,
            leagueId: leagueId,
            homeTeam: m.team1,
            awayTeam: m.team2,
            homeScore: hasScore ? m.homeScore : 0,
            awayScore: hasScore ? m.awayScore : 0,
            isLive: true,
            isFinished: false,
            clock: `约${Math.floor(diffMin)}'`,
            period: diffMin < 45 ? 1 : (diffMin < 60 ? 2 : 2),
            statusText: hasScore ? `⚽ 进行中 约${Math.floor(diffMin)}'` : `⏳ 约${Math.floor(diffMin)}' 比分待更新`,
            homeLogo: m.homeBadge || '',
            awayLogo: m.awayBadge || '',
            date: m.date,
            time: m.time
          });
        }
        // 比赛开始后105-180分钟 → 刚结束（等待确认）
        else if (diffMin >= 105 && diffMin < 180 && m.homeScore !== null) {
          allMatches.push({
            id: m.id,
            leagueId: leagueId,
            homeTeam: m.team1,
            awayTeam: m.team2,
            homeScore: m.homeScore,
            awayScore: m.awayScore,
            isLive: false,
            isFinished: true,
            statusText: '✅ 已结束',
            homeLogo: m.homeBadge || '',
            awayLogo: m.awayBadge || '',
            date: m.date,
            time: m.time
          });
        }
      });
    } catch (e) {
      console.error(`获取 ${leagueId} 实时数据失败:`, e);
    }
  }

  return allMatches;
}

// 获取直播（基于赛程时间估算，国内可访问）
async function fetchLiveAll() {
  return await estimateLiveMatches();
}

// ==================== RENDER HELPERS ====================
// 安全转义 HTML 属性值（用于 onclick 等内联 JS）
function ha(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function teamLogo(badgeUrl, name, size) {
  const s = size || 46;
  if (badgeUrl && (badgeUrl.startsWith('http') || badgeUrl.startsWith('file://'))) {
    return `<div class="team-logo" style="width:${s}px;height:${s}px"><img src="${badgeUrl}" alt="${ha(name)}" onerror="this.parentNode.innerHTML='${ha((name||'?').charAt(0))}'"></div>`;
  }
  return `<div class="team-logo" style="width:${s}px;height:${s}px;font-size:${Math.floor(s*.33)}px">${(name||'?').charAt(0)}</div>`;
}

// 格式化比赛时间（数据已是北京时间）
function formatMatchTime(ev) {
  if (!ev.date) return '';
  try {
    const d = new Date(ev.date + 'T' + (ev.time || '15:00') + ':00+08:00');
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const isTomorrow = d.toDateString() === new Date(now.getTime()+86400000).toDateString();
    const timeStr = d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false});
    if (isToday) return `今天 ${timeStr}`;
    if (isTomorrow) return `明天 ${timeStr}`;
    return `${(d.getMonth()+1)}/${d.getDate()} ${timeStr}`;
  } catch(e) { return ev.date || ''; }
}

// 格式化结果日期
function formatResultDate(ev) {
  if (!ev.date) return '';
  try {
    const d = new Date(ev.date + 'T12:00:00+08:00');
    return `${(d.getMonth()+1)}/${d.getDate()}`;
  } catch(e) { return ev.date; }
}

// 获取比赛时间戳
function getMatchTimestamp(ev) {
  try {
    return new Date(ev.date + 'T' + (ev.time || '15:00') + ':00+08:00').getTime();
  } catch(e) { return 0; }
}

  } else if (isFinished) {
    // 比分待更新状态（数据源延迟）
    if (ev.scorePending) {
      centerHtml = `
        <div class="match-center-league">${leagueLine}</div>
        <div class="match-center-score pending">VS</div>
        <div class="match-center-sub pending-text">${formatResultDate(ev)} 比分待更新</div>`;
    } else {
      centerHtml = `
        <div class="match-center-league">${leagueLine}</div>
        <div class="match-center-score">${ev.homeScore != null ? ev.homeScore : '-'} - ${ev.awayScore != null ? ev.awayScore : '-'}</div>
        <div class="match-center-sub">${formatResultDate(ev)} 已结束</div>`;
    }
  } else {
    const timeStr = formatMatchTime(ev);
    centerHtml = `
      <div class="match-center-league">${leagueLine}</div>
      <div class="match-center-vs">VS</div>
      <div class="match-center-sub">${ha(timeStr)}</div>`;
  }

  // 闹钟按钮（居中在比分下方）
  const alarmId = `alarm_${ev.id}`;
  const hasAlarm = notifications.some(n => n.id === alarmId);
  const bellSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>';
  const checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M9 12l2 2 4-4" stroke-width="2.8"/></svg>';
  const alarmLabel = hasAlarm ? '已设' : '提醒';
  // 比赛已结束 或 比赛时间已过105分钟 → 不显示提醒按钮
  const matchTs = getMatchTimestamp(ev);
  const matchPassed = matchTs && (Date.now() - matchTs) > 105 * 60 * 1000;
  const alarmHtml = showAlarm && !isFinished && !matchPassed && !ev.scorePending
    ? `<button class="match-alarm-btn${hasAlarm?' set':''}" onclick="toggleAlarm('${ha(alarmId)}','${ha(homeDisplay)}','${ha(awayDisplay)}','${ha(formatMatchTime(ev))}','${ha(leagueName)}',${getMatchTimestamp(ev)})">${hasAlarm?checkSvg:bellSvg}<span>${alarmLabel}</span></button>`
    : '';

  const isFav = favTeamNames.includes(ev.team1) || favTeamNames.includes(ev.team2);
  return `
    <div class="match-card${isLive?' live':''}${isFav?' fav':''}">
      <div class="match-side">
        ${homeBadgeHtml}
        <div class="match-side-name">${ha(homeDisplay)}</div>
      </div>
      <div class="match-center">${centerHtml}${alarmHtml}</div>
      <div class="match-side">
        ${awayBadgeHtml}
        <div class="match-side-name">${ha(awayDisplay)}</div>
      </div>
    </div>`;
}

function showLoading(containerId, msg) {

}

// 按日期分组渲染比赛列表（懂球帝风格）
function renderMatchesGroupedByDate(matches, leagueName, leagueId, showAlarm) {
  const groups = {};
  const weekDays = ['日','一','二','三','四','五','六'];
  matches.forEach(m => {
    const dateKey = m.date || '未知日期';
    if (!groups[dateKey]) groups[dateKey] = [];
    groups[dateKey].push(m);
  });

  let html = '';
  const sortedDates = Object.keys(groups).sort();
  for (const dateKey of sortedDates) {
    // 格式化日期标题
    let dateTitle = dateKey;
    try {
      const d = new Date(dateKey + 'T00:00:00+08:00'); // 日期已是北京时间
      const now = new Date();
      const isToday = d.toDateString() === now.toDateString();
      const isTomorrow = d.toDateString() === new Date(now.getTime()+86400000).toDateString();
      const weekDay = weekDays[d.getDay()];
      const dateStr = `${d.getMonth()+1}月${d.getDate()}日`;
      if (isToday) {
        dateTitle = `今天 · ${dateStr} · 星期${weekDay}`;
      } else if (isTomorrow) {
        dateTitle = `明天 · ${dateStr} · 星期${weekDay}`;
      } else {
        dateTitle = `${dateStr} · 星期${weekDay}`;
      }
    } catch(e) {}

    html += `<div class="date-group-title">📅 ${ha(dateTitle)}</div>`;
    html += groups[dateKey].map(ev => renderMatchCard(ev, leagueName, leagueId, showAlarm)).join('');
  }
  return html;
}
function showError(containerId, msg, retryFn) {
  document.getElementById(containerId).innerHTML =
    `<div class="error-wrap"><div style="font-size:32px;margin-bottom:8px">😵</div><div>${msg||'加载失败'}</div><button class="retry-btn" onclick="${retryFn}">重试</button></div>`;
}

// ==================== SCHEDULE PAGE ====================
async function loadSchedule(leagueId, targetDate) {
  leagueId = leagueId || currentLeagues.schedule;
  currentLeagues.schedule = leagueId;
  renderLeagueTabs('scheduleTabs', leagueId, 'loadSchedule');
  showLoading('scheduleContent', '获取最新赛程...');

  const lg = FOOTBALL_LEAGUES[leagueId];
  if (!lg) return;

  try {
    const matches = await fetchNextMatches(leagueId);

    // 基于时间估算实时状态（无需外网API）
    const now = new Date();
    matches.forEach(m => {
      if (m.isFinished) return;
      const matchTime = new Date(m.date + 'T' + (m.time || '15:00') + ':00+08:00'); // 时间已是北京时间
      const diffMin = (now - matchTime) / 60000;
      if (diffMin >= 0 && diffMin < 105) {
        m.isLive = true;
        m.statusText = `⚽ 进行中 约${Math.floor(diffMin)}'`;
      }
    });

    // 按日期筛选
    let filtered = matches;
    if (targetDate) {
      filtered = matches.filter(m => {
        if (!m.date) return false;
        const matchDate = m.date.split('T')[0];
        return matchDate === targetDate;
      });
    } else {
      // 默认显示未结束的比赛
      filtered = matches.filter(m => !m.isFinished).slice(0, 30);
    }

    if (!filtered.length) {
      const dateStr = targetDate || '近期';
      document.getElementById('scheduleContent').innerHTML =
        `<div class="info-banner">⚽ ${dateStr} 暂无赛事安排</div>`;
      return;
    }

    // 按日期分组渲染（懂球帝风格）
    const html = renderMatchesGroupedByDate(filtered, lg.name, leagueId, true);
    const updateStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} 更新`;
    const dateInfo = targetDate ? `📅 ${targetDate}` : `🕐 ${updateStr}`;
    const liveCount = matches.filter(m => m.isLive).length;
    const liveInfo = liveCount ? ` 🔴 ${liveCount}场进行中` : '';
    document.getElementById('scheduleContent').innerHTML =
      `<div class="info-banner">${dateInfo}${liveInfo}</div>` + html;
  } catch(e) {
    showError('scheduleContent', '网络错误，请检查网络连接', `loadSchedule('${leagueId}')`);
  }
}

// ==================== LIVE PAGE ====================
async function loadLive() {
  showLoading('liveContent', '获取实时比分...');
  try {
    const matches = await fetchLiveAll();
    document.getElementById('liveCount').textContent = matches.length;

    if (!matches.length) {
      document.getElementById('liveContent').innerHTML =
        `<div class="info-banner" style="text-align:center;padding:30px 14px">
          <div style="font-size:40px;margin-bottom:10px">⚽</div>
          <b>暂无正在进行的比赛</b><br>
          <span style="color:var(--txt-muted)">比赛期间会自动显示实时比分</span>
        </div>`;
    } else {
      // 按联赛分组
      const matchesByLeague = {};
      const leagueIds = {};
      matches.forEach(m => {
        const lg = FOOTBALL_LEAGUES[m.leagueId];
        const leagueName = lg ? lg.name : m.leagueId;
        if (!matchesByLeague[leagueName]) { matchesByLeague[leagueName] = []; leagueIds[leagueName] = m.leagueId; }
        matchesByLeague[leagueName].push(m);
      });

      let html = `<div class="info-banner">🔴 实时比分 · 每30秒自动刷新</div>`;

      for (const [leagueName, leagueMatches] of Object.entries(matchesByLeague)) {
        html += `<div class="league-group-sub">${leagueLogoHtml(leagueIds[leagueName],13)} ${leagueName}</div>`;
        html += leagueMatches.map(m => renderLiveMatchCard(m)).join('');
      }

      document.getElementById('liveContent').innerHTML = html;
    }

    // 30秒后自动刷新
    clearTimeout(window._liveRefreshTimer);
    window._liveRefreshTimer = setTimeout(() => {
      const activeNav = document.querySelector('.nav-item.active');
      if (activeNav && activeNav.textContent.includes('直播')) {
        loadLive();
      }
    }, 30000);
  } catch(e) {
    console.error('loadLive error:', e);
    document.getElementById('liveContent').innerHTML =
      `<div class="info-banner" style="text-align:center;padding:20px">
        <div style="font-size:32px;margin-bottom:8px">📡</div>
        <b>获取实时比分失败</b><br>
        <span style="font-size:11px;color:var(--danger)">${e.message || '网络错误'}</span><br>
        <button onclick="loadLive()" style="margin-top:10px;padding:6px 16px;background:var(--info);color:var(--txt);border:none;border-radius:6px;cursor:pointer;font-size:12px">重试</button>
      </div>`;
  }
}

// ==================== RESULTS PAGE ====================
async function loadResults(leagueId) {
  leagueId = leagueId || currentLeagues.results;
  currentLeagues.results = leagueId;
  renderLeagueTabs('resultsTabs', leagueId, 'loadResults');
  showLoading('resultsContent', '获取最近战绩...');

  const lg = FOOTBALL_LEAGUES[leagueId];
  if (!lg) return;

  try {
    const matches = await fetchNextMatches(leagueId);
    const now = new Date();

    // 筛选已结束的比赛（包含两种情况）
    const finished = matches.filter(m => {
      // 情况1：有比分数据，确定已结束
      if (m.isFinished) return true;

      // 情况2：无比分但比赛时间已过105分钟（数据源更新延迟）
      const matchTime = new Date(m.date + 'T' + (m.time || '15:00') + ':00+08:00');
      const diffMin = (now - matchTime) / 60000;
      // 比赛开始后105分钟以上，且比赛时间在最近7天内
      const daysDiff = (now - matchTime) / (24 * 60 * 60 * 1000);
      return diffMin >= 105 && daysDiff < 7;
    }).reverse().slice(0, 30);

    // 为没有比分的比赛标记"待更新"状态
    finished.forEach(m => {
      if (m.homeScore === null || m.homeScore === undefined) {
        m.scorePending = true; // 比分待更新标记
      }
    });

    if (!finished.length) {
      document.getElementById('resultsContent').innerHTML =
        `<div class="info-banner">暂无已完成比赛</div>`;
      return;
    }

    const html = renderMatchesGroupedByDate(finished, lg.name, leagueId, false);
    const updateStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} 更新`;
    document.getElementById('resultsContent').innerHTML =
      `<div class="info-banner">📊 最近 ${finished.length} 场结果 · 🕐 ${updateStr}</div>` + html;
  } catch(e) {
    showError('resultsContent', '网络错误，请检查网络连接', `loadResults('${leagueId}')`);
  }
}

// ==================== STANDINGS PAGE ====================
// 根据赛果计算积分榜
function calculateStandingsFromResults(matches) {
  const stats = {};
  
  matches.forEach(m => {
    if (!m.isFinished) return;
    
    const home = m.team1;
    const away = m.team2;
    const homeGoals = m.homeScore;
    const awayGoals = m.awayScore;
    
    if (!stats[home]) stats[home] = {played:0, win:0, draw:0, loss:0, gf:0, ga:0, points:0, cn: getTeamCn(home), badge: getTeamBadge(home)};
    if (!stats[away]) stats[away] = {played:0, win:0, draw:0, loss:0, gf:0, ga:0, points:0, cn: getTeamCn(away), badge: getTeamBadge(away)};
    
    stats[home].played++;
    stats[away].played++;
    stats[home].gf += homeGoals;
    stats[home].ga += awayGoals;
    stats[away].gf += awayGoals;
    stats[away].ga += homeGoals;
    
    if (homeGoals > awayGoals) {
      stats[home].win++;
      stats[home].points += 3;
      stats[away].loss++;
    } else if (homeGoals < awayGoals) {
      stats[away].win++;
      stats[away].points += 3;
      stats[home].loss++;
    } else {
      stats[home].draw++;
      stats[away].draw++;
      stats[home].points++;
      stats[away].points++;
    }
  });
  
  return Object.entries(stats)
    .map(([name, s]) => ({
      name,
      ...s,
      gd: s.gf - s.ga
    }))
    .sort((a, b) => b.points - a.points || b.gd - a.gd || b.gf - a.gf);
}

async function loadStandings(leagueId) {
  leagueId = leagueId || currentLeagues.standings;
  currentLeagues.standings = leagueId;
  renderLeagueTabs('standingsTabs', leagueId, 'loadStandings');
  showLoading('standingsContent', '获取积分榜...');

  const lg = FOOTBALL_LEAGUES[leagueId];
  if (!lg) return;

  // 杯赛：无积分榜，显示淘汰赛程
  if (lg.cupData) {
    const matches = await fetchNextMatches(leagueId);
    const finished = matches.filter(m => m.isFinished);
    const upcoming = matches.filter(m => !m.isFinished);
    let html = `<div class="info-banner">${leagueLogoHtml(leagueId,16)} ${lg.name} · 淘汰赛制，无积分榜</div>`;
    if (upcoming.length) {
      html += `<div class="section-title">📅 待赛</div>`;
      html += renderMatchesGroupedByDate(upcoming, lg.name, leagueId, true);
    }
    if (finished.length) {
      html += `<div class="section-title">✅ 已完赛</div>`;
      html += renderMatchesGroupedByDate(finished.reverse(), lg.name, leagueId, false);
    }
    if (!matches.length) html += `<div class="info-banner">暂无${lg.name}赛程数据</div>`;
    document.getElementById('standingsContent').innerHTML = html;
    return;
  }

  try {
    const matches = await fetchNextMatches(leagueId);

    // 欧冠：联赛阶段积分榜 + 淘汰赛赛程
    if (leagueId === 'CL') {
      const leagueMatches = matches.filter(m => m.round && m.round.startsWith('League'));
      const knockoutMatches = matches.filter(m => m.round && !m.round.startsWith('League'));
      const standings = calculateStandingsFromResults(leagueMatches);
      
      let html = '';
      if (standings.length) {
        html += `<div class="info-banner">${leagueLogoHtml(leagueId,16)} ${lg.name} 联赛阶段积分榜</div>`;
        html += renderStandingsTable(standings, 'cl');
      }
      if (knockoutMatches.length) {
        html += `<div class="info-banner" style="margin-top:16px">🏆 淘汰赛赛程</div>`;
        html += renderKnockoutMatches(knockoutMatches);
      }
      if (!html) html = `<div class="info-banner">${leagueLogoHtml(leagueId,16)} 暂无${lg.name}数据</div>`;
      document.getElementById('standingsContent').innerHTML = html;
      return;
    }
    
    // 世界杯：分组信息 + 赛程
    if (leagueId === 'WC') {
      let html = `<div class="info-banner">${leagueLogoHtml('WC',16)} 2026 FIFA 世界杯 · 美国/加拿大/墨西哥 · 48队·12组·104场</div>`;
      // 分组展示
      for (const [group, teams] of Object.entries(WORLD_CUP_2026_GROUPS)) {
        html += `<div class="section-title" style="font-size:13px;margin:10px 0 6px">${group}组</div>`;
        html += `<div class="standings-table"><div class="standings-head"><div>#</div><div>球队</div><div></div><div></div><div></div><div></div><div></div></div>`;
        teams.forEach((t, i) => {
          const cn = getTeamCn(t);
          const badge = getTeamBadge(t);
          const isFav = favTeamNames.includes(t);
          html += `<div class="standings-row${isFav?' fav':''}">
            <div class="st-rank">${i+1}</div>
            <div class="st-team">
              ${badge ? `<img class="wc-flag" src="${ha(badge)}" alt="${ha(cn)}" onerror="this.style.display='none'">` : `<div class="st-team-icon">${ha((cn||'?').charAt(0))}</div>`}
              <div class="st-name">${ha(cn || t)}</div>
            </div>
            <div class="st-num">-</div><div class="st-num">-</div><div class="st-num">-</div><div class="st-num">-</div><div class="st-pts">-</div>
          </div>`;
        });
        html += `</div>`;
      }
      // 赛程
      if (matches.length) {
        html += `<div class="info-banner" style="margin-top:16px">📅 世界杯赛程</div>`;
        html += renderWorldCupMatches(matches);
      }
      document.getElementById('standingsContent').innerHTML = html;
      return;
    }
    
    // 五大联赛：传统积分榜
    const standings = calculateStandingsFromResults(matches);
    
    if (!standings.length) {
      document.getElementById('standingsContent').innerHTML =
        `<div class="info-banner">${leagueLogoHtml(leagueId,16)} 暂无比赛数据，无法计算积分榜</div>`;
      return;
    }

    const rows = standings.map((entry, i) => {
      const rank = i + 1;
      let rankClass = '';
      if (rank <= 4) rankClass = 'top4';
      else if (rank <= 6) rankClass = 'top6';
      else if (rank >= standings.length - 2) rankClass = 'rel';
      
      const isFav = favTeamNames.includes(entry.name);
      const displayName = entry.cn || entry.name;
      
      return `<div class="standings-row${isFav?' fav':''}">
        <div class="st-rank ${rankClass}">${rank}</div>
        <div class="st-team">
          ${entry.badge ? `<img src="${ha(entry.badge)}" alt="${ha(displayName)}" onerror="this.style.display='none'">` : `<div class="st-team-icon">${ha((displayName||'?').charAt(0))}</div>`}
          <div class="st-name">${displayName||''}</div>
        </div>
        <div class="st-num">${entry.played||0}</div>
        <div class="st-num">${entry.win||0}</div>
        <div class="st-num">${entry.loss||0}</div>
        <div class="st-num">${entry.gd>=0?'+':''}${entry.gd||0}</div>
        <div class="st-pts">${entry.points||0}</div>
      </div>`;
    }).join('');

    const legendHtml = `
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>欧冠资格</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--info)"></div>欧联/欧协</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div>降级区</div>
      </div>`;

    document.getElementById('standingsContent').innerHTML = `
      <div class="info-banner">${leagueLogoHtml(leagueId,16)} ${lg.name} 积分榜（根据赛果实时计算）</div>
      ${legendHtml}
      <div class="standings-table">
        <div class="standings-head"><div>#</div><div>球队</div><div>赛</div><div>胜</div><div>负</div><div>净</div><div>分</div></div>
        ${rows}
      </div>`;
  } catch(e) {
    showError('standingsContent', '网络错误', `loadStandings('${leagueId}')`);
  }
}

function renderStandingsTable(standings, type) {
  const rows = standings.map((entry, i) => {
    const rank = i + 1;

    if (type === 'cl') {
      if (rank <= 8) rankClass = 'top4';      // 直接晋级16强
      else if (rank <= 24) rankClass = 'top6'; // 附加赛

      if (rank <= 4) rankClass = 'top4';
      else if (rank <= 6) rankClass = 'top6';
      else if (rank >= standings.length - 2) rankClass = 'rel';
    }
    const isFav = favTeamNames.includes(entry.name);
    const displayName = entry.cn || entry.name;
    return `<div class="standings-row${isFav?' fav':''}">
      <div class="st-rank ${rankClass}">${rank}</div>
      <div class="st-team">
        ${entry.badge ? `<img src="${ha(entry.badge)}" alt="${ha(displayName)}" onerror="this.style.display='none'">` : `<div class="st-team-icon">${ha((displayName||'?').charAt(0))}</div>`}
        <div class="st-name">${displayName||''}</div>
      </div>
      <div class="st-num">${entry.played||0}</div>
      <div class="st-num">${entry.win||0}</div>
      <div class="st-num">${entry.loss||0}</div>
      <div class="st-num">${entry.gd>=0?'+':''}${entry.gd||0}</div>
      <div class="st-pts">${entry.points||0}</div>
    </div>`;
  }).join('');
  
  const legendHtml = type === 'cl' ? `
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>直接晋级16强</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--info)"></div>附加赛</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div>淘汰</div>
    </div>` : '';
  
  return `${legendHtml}

      ${rows}
    </div>`;
}

// 渲染淘汰赛赛程（欧冠/世界杯）
function renderKnockoutMatches(matches) {
  const rounds = {};
  matches.forEach(m => {
    const roundName = m.round || '未知轮次';
    if (!rounds[roundName]) rounds[roundName] = [];
    rounds[roundName].push(m);
  });
  
  let html = '';
  for (const [round, games] of Object.entries(rounds)) {

function addCustomAlarm() {
  const label = document.getElementById('customAlarmLabel').value.trim() || '足球闹钟';
  const time = document.getElementById('customAlarmTime').value;
  if (!time) { showToast('请选择时间'); return; }

    id: 'custom_' + Date.now(),
    label,
    time,
    repeat: [...repeatDays],
    enabled: true,
    isCustom: true,
  };

  customAlarms.push(alarm);

function scheduleAndroidAlarm(alarm) {
  // Call Android native interface if available
  // 优先使用增强版闹钟接口（自动适配 ColorOS）
  if (window.AndroidAlarm && window.AndroidAlarm.createEnhancedAlarm) {
    try {
      const [h, m] = alarm.time.split(':').map(Number);
      const now = new Date();
      const alarmTime = new Date(now);
      alarmTime.setHours(h, m, 0, 0);
      if (alarmTime <= now) alarmTime.setDate(alarmTime.getDate() + 1);
      const result = window.AndroidAlarm.createEnhancedAlarm(
        alarm.id,
        alarm.label,
        'custom',
        alarmTime.getTime(),
        false  // 非静音模式
      );
      // 尝试解析返回结果
      try {
        const resultObj = JSON.parse(result);
        if (!resultObj.success) {
          console.warn('增强闹钟返回失败:', resultObj.message);
        }
      } catch(e) {}
    } catch(e) {
      console.warn('createEnhancedAlarm 调用失败:', e.message);
      // 回退到原来的方式
      fallbackToSystemAlarm(alarm);
    }
  } else if (window.AndroidAlarm && window.AndroidAlarm.createSystemAlarm) {
    fallbackToSystemAlarm(alarm);
  }
}

function fallbackToSystemAlarm(alarm) {
  // 回退方案：使用原有的系统闹钟接口
  try {
    const [h, m] = alarm.time.split(':').map(Number);
    const now = new Date();
    const alarmTime = new Date(now);
    alarmTime.setHours(h, m, 0, 0);
    if (alarmTime <= now) alarmTime.setDate(alarmTime.getDate() + 1);
    window.AndroidAlarm.createSystemAlarm(
      alarm.id,
      alarm.label,
      'custom',
      alarmTime.getTime(),
      false
    );
  } catch(e) {
    console.warn('回退闹钟方式也失败:', e.message);
  }
}

}

// 通过 Android Intent 调起本地日历新建事件（国内可用，不依赖Google Calendar网页）
function addToCalendar(title, startMs, endMs, description) {
  // 优先使用 Android 原生日历 Intent
  if (window.AndroidAlarm && window.AndroidAlarm.addCalendarEvent) {
    try {
      window.AndroidAlarm.addCalendarEvent(title, startMs, endMs, description || '');
      showToast('📅 已打开日历，请确认事件');
      return;
    } catch(e) {
      console.warn('Android日历接口失败:', e);
    }
  }
  // 回退：使用 Intent URI scheme 调起日历（不使用Google Calendar网页）
  try {
    const pad = (n) => String(n).padStart(2, '0');
    const d = new Date(startMs);
    const fmt = d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate())
      + 'T' + pad(d.getHours()) + pad(d.getMinutes()) + '00';
    // 使用 content:// 调起本地日历，而非 Google Calendar 网页
    const intentUri = 'intent:#Intent;action=android.intent.action.INSERT;'
      + 'type=vnd.android.cursor.item/event;'
      + 'S.title=' + encodeURIComponent(title) + ';'
      + 'L.endTime=' + endMs + ';'
      + 'L.beginTime=' + startMs + ';'
      + 'S.description=' + encodeURIComponent(description || '') + ';'
      + 'end';
    window.open(intentUri, '_blank');
    showToast('📅 已打开日历，请确认事件');
  } catch(e) {
    showToast('⚠️ 无法打开日历应用');
  }
}

  let updated = false;
  for (const lid of leagueIds) {
    try {
      const matches = await fetchNextMatches(lid);
      if (matches && matches.length) updated = true;
    } catch(e) {}
  }
  if (updated) {
    renderMyMatches();
    renderTodayMatches();  // 同步刷新今日赛事
  }
}

  if (!permList || !permCard) return;

  if (!window.AndroidAlarm) {

      {
        key: 'notification',
        icon: '🔔',
        label: '通知权限',
        desc: '收到闹钟提醒通知',
        granted: permissionStatus.notification,
        action: 'requestNotificationPermissionFromJS',
        isBase: true
      },
      {
        key: 'batteryWhitelist',
        icon: '🔋',
        label: '电池优化白名单',
        desc: '防止系统杀后台导致闹钟失效',
        granted: permissionStatus.batteryWhitelist,
        action: 'requestBatteryWhitelist',

        icon: '📱',
        label: '悬浮窗/锁屏弹出',
        desc: '闹钟响铃时在锁屏上全屏显示',

        isBase: true

    // 品牌特定提醒项（无granted状态，显示为"去设置"）
    const brandPerms = (brandGuide.items || []).map(item => ({
      key: item.action,
      icon: item.icon,

      desc: item.desc,

      action: 'openBrandSetting',
      brandAction: item.action,
      isBrand: true

    // 合并：基础权限 + 品牌特定
    const allPerms = [...basePerms, ...brandPerms];

    const grantedCount = basePerms.filter(p => p.granted).length;
    permProgress.textContent = `${grantedCount}/${basePerms.length} 基础权限`;

    // 计算是否所有基础权限都通过
    const allBaseGranted = basePerms.every(p => p.granted);

    if (allBaseGranted) {
      permissionCardCollapsed = true;

    if (allBaseGranted && brandPerms.length === 0) {

      permCard.style.background = 'rgba(0,212,170,0.06)';

        <span style="font-size:18px">🔐</span>
        <span style="font-size:14px;font-weight:700;color:#ffb74d">权限设置</span>

// 折叠/展开权限设置卡片
function togglePermissionCard() {
  permissionCardCollapsed = !permissionCardCollapsed;
  var body = document.getElementById('permissionCardBody');
  var icon = document.getElementById('permToggleIcon');
  if (body) body.style.display = permissionCardCollapsed ? 'none' : '';

function fixPermission(actionName, brandAction) {
  if (!window.AndroidAlarm) return;
  try {
    // 品牌特定设置
    if (actionName === 'openBrandSetting' && brandAction) {
      openBrandSpecificSetting(brandAction);
      return;
    }
    window.AndroidAlarm[actionName]();
    showToast('请在设置页面中授予权限');
    setTimeout(checkAndRenderPermissions, 3000);
  } catch (e) {
    showToast('跳转失败：' + e.message);
  }
}

// 品牌特定设置跳转
function openBrandSpecificSetting(action) {
  if (!window.AndroidAlarm) return;
  try {
    // 调用Android端的厂商特定设置跳转
    if (window.AndroidAlarm.openManufacturerBatterySettings) {
      window.AndroidAlarm.openManufacturerBatterySettings();
      showToast('已打开厂商电池设置，请按提示操作');
    } else if (window.AndroidAlarm.openAutoStartSettings) {
      window.AndroidAlarm.openAutoStartSettings();
      showToast('已打开自启动管理，请开启本应用');
    } else {
      // 回退到通用电池设置
      window.AndroidAlarm.requestBatteryWhitelist();
      showToast('已打开电池优化设置');
    }
    setTimeout(checkAndRenderPermissions, 3000);
  } catch (e) {
    showToast('跳转失败，请手动设置：' + e.message);
  }
}

function openAllMissingPermissions() {
  if (!window.AndroidAlarm) return;
  try {
    const missing = window.AndroidAlarm.getMissingPermissions();
    const list = JSON.parse(missing);
    if (list.length === 0) {
      showToast('✅ 所有权限已授权！');
      checkAndRenderPermissions();
      return;
    }

    // 按优先级逐个跳转：先精确闹钟 → 通知 → 电池 → 悬浮窗
    const priorityOrder = ['exactAlarm', 'notification', 'batteryWhitelist', 'overlay'];
    const actionMap = {
      'exactAlarm': 'openExactAlarmSettings',
      'notification': 'requestNotificationPermissionFromJS',
      'batteryWhitelist': 'requestBatteryWhitelist',
      'overlay': 'openOverlaySettings'
    };

    // 找到第一个缺失的权限并跳转
    for (const key of priorityOrder) {
      if (list.includes(key)) {
        window.AndroidAlarm[actionMap[key]]();
        showToast(`正在打开「${key === 'exactAlarm' ? '精确闹钟' : key === 'notification' ? '通知' : key === 'batteryWhitelist' ? '电池优化' : '悬浮窗'}」设置...`);
        break;
      }
    }

    // 延迟刷新
    setTimeout(checkAndRenderPermissions, 3000);
  } catch (e) {
    showToast('跳转失败：' + e.message);
  }
}
